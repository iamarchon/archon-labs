<style>
/* ══ AGENTFLOW · LIGHT DESIGN SYSTEM ══ */
:root {
  /* Backgrounds — cream/white, airy */
  --bg: #f7f6f2;
  --bg2: #f0efe9;
  --surface: #ffffff;
  --surface2: #f5f4f0;
  --surface3: #eceae3;

  /* Text */
  --text: #0c0c0c;
  --muted: #6b6b6b;
  --muted2: #ababab;

  /* Borders */
  --border: rgba(0,0,0,.08);
  --border2: rgba(0,0,0,.14);

  /* Brand — ridealso-inspired purple palette */
  --teal: #ac74fc;          /* bright purple — replaces teal as primary accent */
  --teal-l: #9150f0;        /* darker purple hover */
  --teal-bg: rgba(172,116,252,.08);
  --teal-bd: rgba(172,116,252,.25);
  --purple-deep: #381b5e;   /* deep purple — dark hero sections */
  --lime: #b1ff8f;          /* lime green — secondary accent */

  /* Semantic colors */
  --green: #1a9e50;
  --green-bg: rgba(26,158,80,.07);
  --green-bd: rgba(26,158,80,.2);
  --amber: #d97706;
  --amber-bg: rgba(217,119,6,.08);
  --amber-bd: rgba(217,119,6,.22);
  --red: #dc2626;
  --red-bg: rgba(220,38,38,.07);
  --red-bd: rgba(220,38,38,.2);
  --blue: #2563eb;
  --blue-bg: rgba(37,99,235,.07);
  --blue-bd: rgba(37,99,235,.2);
  --violet: #ac74fc;
  --violet-bg: rgba(172,116,252,.07);
  --violet-bd: rgba(172,116,252,.22);

  /* Typography */
  --font: 'Cabinet Grotesk', system-ui, sans-serif;
  --display: 'Cabinet Grotesk', sans-serif;
  --mono: 'JetBrains Mono', monospace;

  /* Shadows — lighter, editorial */
  --shadow: 0 1px 4px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.05);
  --shadow-md: 0 4px 20px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg: 0 16px 48px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.05);

  --r: 12px;
  --nav-h: 64px;
  /* Shared pill button */
  --btn-radius: 980px;
  /* CTA button radius — ridealso uses 8px, we use 12px for a refined rounded-rect feel */
  --cta-radius: 12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);}

/* ── TOP NAV — ridealso style ── */
.topnav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-h);
  background: #FFFDE7;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: stretch;
  padding: 0;
}
/* Logo — left */
.tn-logo {
  display: flex; align-items: center;
  font-family: var(--display); font-size: 17px; font-weight: 900;
  letter-spacing: -0.05em; color: var(--text); text-decoration: none;
  padding: 0 24px; white-space: nowrap; flex-shrink: 0;
}
.tn-logo span { color: var(--teal); }

/* Tabs — compact pill segmented control */
.nav-tabs {
  display: flex; align-items: center; justify-content: center; gap: 2px;
  background: #FFFFF0;
  border: 2.5px solid #1a1a1a;
  border-radius: 980px;
  padding: 3px;
  margin: auto 0;
  box-shadow: 3px 3px 0 #1a1a1a;
}
.nav-tab {
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  letter-spacing: -0.02em;
  color: #555; padding: 6px 15px;
  cursor: pointer; border: none; background: transparent;
  border-radius: 980px;
  white-space: nowrap;
  position: relative;
  transition: all .15s cubic-bezier(.4,0,.2,1);
}
.nav-tab::after { display: none; }
.nav-tab:hover { color: #1a1a1a; background: rgba(0,0,0,.06); }
.nav-tab.active {
  color: #1a1a1a; font-weight: 800;
  background: #FFE135;
  border: 1.5px solid #1a1a1a;
  box-shadow: 2px 2px 0 #1a1a1a;
}
.nav-tab svg { width: 12px; height: 12px; stroke: currentColor; flex-shrink: 0; }

/* Right side — wallet + CTA + avatar */
.tn-right {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 10px; padding: 0 24px;
}
.tn-wallet {
  font-size: 12px; font-weight: 700; color: #1a1a1a;
  font-family: var(--mono); cursor: pointer;
  background: #FFE135; border: 2px solid #1a1a1a;
  padding: 6px 14px; border-radius: 980px; transition: all .15s;
  white-space: nowrap; box-shadow: 2px 2px 0 #1a1a1a;
}
.tn-wallet:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #1a1a1a; }

/* Reserve-style CTA — ridealso rounded-rect button */
.nav-post-btn {
  background: #1a1a1a; color: #FFE135; border: 2px solid #1a1a1a;
  font-family: var(--display); font-size: 13px; font-weight: 800;
  padding: 9px 22px; border-radius: var(--cta-radius); cursor: pointer;
  letter-spacing: -0.02em; transition: all .15s; white-space: nowrap;
  box-shadow: 3px 3px 0 #FFE135;
}
.nav-post-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #FFE135; }
.tn-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: #FFE135; color: #1a1a1a;
  border: 2px solid #1a1a1a;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; cursor: pointer;
  user-select: none; font-family: var(--display); transition: all .15s;
  box-shadow: 2px 2px 0 #1a1a1a;
}
.tn-avatar:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #1a1a1a; }

/* ── LAYOUT ── */
.main{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view{display:none;}
.view.active{display:block;animation:vIn .2s ease;}
@keyframes vIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.tabbar{display:none!important;}
.fab{display:none!important;}

/* ── MODALS → CENTERED DIALOGS ── */
@keyframes ovIn{from{opacity:0}to{opacity:1}}
@keyframes mdIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;display:none;align-items:center;justify-content:center;padding:24px;}
.sheet-overlay.open{display:flex;animation:ovIn .2s ease;}
.sheet{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;animation:mdIn .28s cubic-bezier(.22,.68,0,1.2);box-shadow:var(--shadow-lg);}
.sheet-handle{display:none;}
.sheet-header{padding:22px 26px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.sheet-title{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:-.3px;color:var(--text);}
.sheet-close{background:var(--surface2);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;font-weight:700;transition:all .15s;}
.sheet-close:hover{background:var(--surface3);color:var(--text);}
.sheet-body{padding:22px 26px 32px;}

/* ══ APPLE TASK DETAIL POPUP ══ */
@keyframes tdIn {
  from { opacity:0; transform: scale(.95) translateY(12px); }
  to   { opacity:1; transform: scale(1)   translateY(0); }
}
.td-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  padding: 16px;
  animation: ovIn .2s ease;
}
.td-overlay.open { display: flex; }
.td-modal {
  background: #fff;
  border-radius: 22px;
  width: 100%; max-width: min(960px, 96vw);
  max-height: 95vh; overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.22); border: 1.5px solid rgba(0,0,0,.1);
  animation: tdIn .3s cubic-bezier(.22,.68,0,1.2);
  position: relative;
}
/* Scrollbar inside modal */
.td-modal::-webkit-scrollbar { width: 4px; }
.td-modal::-webkit-scrollbar-track { background: transparent; }
.td-modal::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 4px; }

/* Close button — top right */
.td-close {
  position: absolute; top: 18px; right: 18px; z-index: 10;
  width: 30px; height: 30px; border-radius: 50%;
  background: #f2f2f7; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #6e6e73;
  transition: all .15s; flex-shrink: 0;
}
.td-close:hover { background: #e5e5ea; color: #1d1d1f; }

/* Header — emoji + title */
.td-header {
  padding: 32px 32px 0;
  display: flex; align-items: flex-start; gap: 18px;
}
.td-icon {
  width: 72px; height: 72px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 38px; flex-shrink: 0;
  background: #f2f2f7;
}
.td-header-text { flex: 1; padding-top: 2px; }
.td-eyebrow2 {
  font-size: 14px; color: #6e6e73; margin-bottom: 6px;
  font-family: var(--display); font-weight: 400;
}
.td-title2 {
  font-size: 26px; font-weight: 700; letter-spacing: -.5px;
  line-height: 1.15; color: #1d1d1f;
  font-family: var(--display);
}
.td-status-line {
  margin-top: 8px; font-size: 15px; font-weight: 600;
  font-family: var(--display);
}
.td-div {
  border: none; border-top: 1px solid #e5e5ea;
  margin: 24px 32px;
}
.td-body { padding: 0 32px 32px; }

/* Detail rows inside td-body */
.td-meta-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 0; border-bottom: 1px solid #f2f2f7;
  font-size: 15px; font-family: var(--display);
}
.td-meta-row:last-child { border-bottom: none; }
.td-meta-label {
  color: #6e6e73; font-size: 14px; min-width: 110px; flex-shrink: 0;
}
.td-meta-value { color: #1d1d1f; font-weight: 500; }
.td-agent-link {
  color: var(--teal); font-weight: 600; cursor: pointer;
  text-decoration: none; background: none; border: none;
  font-family: var(--display); font-size: 15px; padding: 0;
}
.td-agent-link:hover { text-decoration: underline; }
.td-ticket-badge {
  font-size: 11px; font-weight: 700; font-family: var(--mono);
  background: var(--amber-bg); border: 1px solid var(--amber-bd);
  color: var(--amber); padding: 3px 10px; border-radius: 980px;
  cursor: pointer;
}
.td-ticket-badge:hover { background: var(--amber); color: #fff; }

/* ── AGENT DETAIL MODAL ── */
.ad-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:none;align-items:center;justify-content:center;padding:24px;}
.ad-overlay.open{display:flex;animation:ovIn .2s ease;}
.ad-sheet{background:var(--surface);border-radius:20px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;animation:mdIn .28s cubic-bezier(.22,.68,0,1.2);box-shadow:var(--shadow-lg);border:1px solid var(--border);}
.ad-hero{position:relative;overflow:hidden;min-height:190px;display:flex;align-items:flex-end;padding:24px;border-radius:20px 20px 0 0;}
.ad-hero-bg{position:absolute;inset:0;z-index:0;}
.ad-hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.08) 0%,rgba(0,0,0,.78) 100%);z-index:1;}
.ad-hero-close{position:absolute;top:16px;right:16px;z-index:3;background:rgba(0,0,0,.45);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:50%;width:32px;height:32px;cursor:pointer;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s;}
.ad-hero-close:hover{background:rgba(0,0,0,.7);}
.ad-big-icon{width:72px;height:72px;border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(0,0,0,.5);position:relative;z-index:2;flex-shrink:0;margin-right:16px;overflow:hidden;}
.ad-big-icon svg{width:34px;height:34px;stroke:#fff;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.ad-big-icon img{width:100%;height:100%;object-fit:cover;}
.ad-hero-text{position:relative;z-index:2;}
.ad-agent-name{font-family:var(--display);font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.2;}
.ad-agent-role{font-size:13px;color:rgba(255,255,255,.65);margin-top:4px;}
.ad-body{padding:24px 26px;}
.ad-rating-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.ad-star{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:4px;}
.ad-dot{width:3px;height:3px;border-radius:50%;background:var(--muted2);}
.ad-stat-pill{font-size:12px;color:var(--muted);font-family:var(--mono);}
.ad-creator-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.ad-creator-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-l));display:flex;align-items:center;justify-content:center;color:#000;font-size:15px;font-weight:800;flex-shrink:0;font-family:var(--display);}
.ad-creator-name{font-size:15px;font-weight:600;letter-spacing:-.2px;color:var(--text);}
.ad-creator-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.ad-section-title{font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:-.2px;margin-bottom:10px;color:var(--text);}
.ad-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.ad-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.ad-tag{font-size:11px;font-weight:600;background:var(--surface2);color:var(--muted);padding:4px 10px;border-radius:6px;font-family:var(--mono);border:1px solid var(--border);}
.ad-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.ad-stat-box{background:var(--surface2);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border);}
.ad-stat-val{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--text);line-height:1;}
.ad-stat-lbl{font-size:10px;color:var(--muted);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.ad-pricing{background:var(--teal-bg);border:1px solid var(--teal-bd);border-radius:12px;padding:18px;margin-bottom:24px;}
.ad-price-from{font-size:11px;color:var(--teal);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.ad-price-val{font-size:30px;font-weight:900;font-family:var(--mono);color:var(--text);letter-spacing:-.04em;}
.ad-price-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.ad-footer{display:flex;gap:10px;padding:0 26px 28px;}
/* ── RIDEALSO ROUNDED-RECT BUTTONS ── */
.btn-hire{flex:1;background:var(--purple-deep);color:#fff;border:none;font-family:var(--display);font-size:15px;font-weight:700;padding:15px 28px;border-radius:var(--cta-radius);cursor:pointer;transition:all .25s;letter-spacing:-.02em;}
.btn-hire:hover{background:var(--teal);transform:translateY(-1px);box-shadow:0 6px 20px rgba(172,116,252,.35);}
.btn-hire:active{transform:scale(.98);}
.btn-share{background:transparent;border:1.5px solid var(--border2);border-radius:var(--cta-radius);padding:15px 18px;cursor:pointer;color:var(--muted);transition:all .25s;font-family:var(--display);font-size:14px;font-weight:600;}
.btn-share:hover{border-color:var(--teal);color:var(--teal);}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:var(--r);padding:18px;border:1.5px solid var(--border2);margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.card-title{font-family:var(--display);font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;letter-spacing:-.2px;color:var(--text);}

/* ── FORMS ── */
.fg{margin-bottom:16px;}
.fl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.06em;text-transform:uppercase;}
.fi,.fta,.fs{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:10px 13px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color .15s;}
.fta{resize:none;}.fs{appearance:none;}.fi{font-family:var(--mono);}
.fi:focus,.fta:focus,.fs:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-bg);}
.tier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:4px;}
.tier-opt{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.tier-opt.selected{background:var(--teal-bg);border-color:var(--teal-bd);}
.tier-icon{font-size:18px;margin-bottom:4px;}
.tier-name{font-size:11px;font-weight:700;color:var(--text);}
.tier-desc{font-size:9px;color:var(--muted);margin-top:2px;}
.budget-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.bchip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 11px;font-size:11px;font-family:var(--mono);font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;}
.bchip:hover{border-color:var(--amber-bd);color:var(--amber);}
.ex-chips{display:flex;gap:5px;flex-wrap:wrap;}
.ex-task{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;}
.ex-task:hover{border-color:var(--blue-bd);color:var(--blue);}
.cb{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;font-family:var(--mono);}
.cb-simple{background:var(--green-bg);color:var(--green);}.cb-medium{background:var(--blue-bg);color:var(--blue);}
.cb-complex{background:var(--amber-bg);color:var(--amber);}.cb-heavy{background:var(--red-bg);color:var(--red);}
.sug-row{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-top:7px;}
.sug-label{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;}
.sug-chip{background:var(--violet-bg);border:1px solid var(--violet-bd);color:var(--violet);font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;cursor:pointer;font-family:var(--font);transition:all .15s;}
.sug-chip:hover{background:var(--violet);color:#fff;border-color:var(--violet);}
.sug-chip:disabled{opacity:.5;cursor:default;}
.sug-preview-box{background:var(--surface);border:1px solid var(--violet-bd);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;}
.sug-preview-box.loading{color:var(--muted);font-style:italic;}
.sug-preview-label{font-size:10px;font-weight:700;color:var(--violet);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.sug-preview-text{color:var(--text);line-height:1.5;margin-bottom:8px;}
.sug-preview-actions{display:flex;gap:6px;}
.sug-accept{background:var(--violet);color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);}
.sug-accept:hover{opacity:.85;}

.btn-post{width:100%;background:var(--purple-deep);color:#fff;border:none;font-family:var(--display);font-size:15px;font-weight:700;padding:14px 20px;border-radius:var(--cta-radius);cursor:pointer;margin-top:8px;transition:all .25s;letter-spacing:-.02em;display:flex;align-items:center;justify-content:center;gap:8px;}

.btn-approve{background:var(--green);color:#fff;border:none;font-family:var(--font);font-size:12px;font-weight:700;padding:8px 16px;border-radius:980px;cursor:pointer;transition:all .25s;}

.btn-retry{background:var(--teal);color:#fff;border:none;font-family:var(--font);font-size:12px;font-weight:700;padding:8px 14px;border-radius:980px;cursor:pointer;transition:all .25s;}

.hp{font-family:var(--mono);font-size:12px;opacity:.85;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:500;padding:10px 20px;border-radius:10px;z-index:1000;white-space:nowrap;box-shadow:var(--shadow-lg);animation:tIn .3s ease;}
.toast.success{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.toast.error{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}

/* ── Bid Terminal ── */
.bid-terminal{background:#0d1117;border-radius:14px;overflow:hidden;margin-bottom:14px;}

.bt-countdown{font-size:11px;font-family:var(--mono);font-weight:700;}
.bt-body{max-height:160px;overflow-y:auto;padding:10px 12px;}

.bt-footer{background:#161b22;padding:7px 12px;font-size:10px;color:#484f58;font-family:var(--mono);border-top:1px solid #30363d;}
.task-header{background:var(--surface);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.task-title-display{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.4;}
.task-meta-chips{display:flex;gap:5px;flex-wrap:wrap;}
.meta-chip{font-size:10px;padding:2px 8px;border-radius:980px;font-family:var(--mono);font-weight:600;}
.mc-budget{background:var(--amber-bg);color:var(--amber);}
.mc-tier{background:var(--blue-bg);color:var(--blue);}
.sort-row{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;}

.sort-tab{flex-shrink:0;background:var(--surface2);border:none;color:var(--muted);font-family:var(--font);font-size:11px;font-weight:600;padding:5px 12px;border-radius:980px;cursor:pointer;transition:all .15s;}
.sort-tab.active{background:var(--teal-bg);color:var(--teal);}
.bid-cards{display:flex;flex-direction:column;gap:10px;}
.bid-card{background:var(--surface);border-radius:14px;padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.bc-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:980px;display:inline-block;margin-bottom:4px;}
.bcb-cheap{background:var(--green);color:#fff;}
.bcb-rated{background:var(--blue);color:#fff;}

.bc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}

.bc-price-block{margin-left:auto;text-align:right;flex-shrink:0;}

.bc-savings{font-size:10px;font-weight:600;color:var(--green);font-family:var(--mono);}

.live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);animation:lp 1.5s infinite;margin-right:4px;}

/* ── Task Cards (buyer) ── */
.task-card{background:var(--surface);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;animation:cardIn .3s ease;}
@keyframes cardIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.tc-head{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}

.tc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

.eta-overdue{margin-top:6px;font-size:11px;font-weight:500;color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:6px;padding:5px 10px;}
.eta-very-late{color:var(--red);background:var(--red-bg);border-color:var(--red-bd);}
.eta-tip{display:block;font-size:10px;font-weight:400;margin-top:2px;opacity:.8;}
.prog-fill{height:3px;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:2px;animation:pp 2s ease-in-out infinite;}
@keyframes pp{0%,100%{opacity:.6}50%{opacity:1}}
.tc-log{padding:10px 16px;border-top:1px solid rgba(0,0,0,.06);}
.log-lbl{font-size:9px;font-weight:600;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.log-row{display:flex;gap:8px;font-size:10px;margin-bottom:3px;font-family:var(--mono);}
.log-t{color:var(--muted2);white-space:nowrap;}
.log-m{color:var(--muted);line-height:1.5;}
.log-m.cur::after{content:'▌';animation:bl .7s infinite;color:var(--teal);}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.tc-deliv{padding:16px;border-top:1px solid rgba(0,0,0,.06);}
.deliv-wrap{position:relative;}
.deliv-wrap.collapsed .md-body{max-height:320px;overflow:hidden;}
.deliv-wrap.collapsed .deliv-fade{display:block;}
.deliv-fade{display:none;position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--surface2));border-radius:0 0 12px 12px;pointer-events:none;}
.deliv-toggle{width:100%;margin-top:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .15s;}
.deliv-toggle:hover{background:var(--surface3);color:var(--text);}
.deliv-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.deliv-lbl{font-size:10px;font-weight:600;color:var(--green);letter-spacing:.05em;text-transform:uppercase;font-family:var(--mono);}
.deliv-tok{font-size:10px;color:var(--muted2);font-family:var(--mono);}
.btn-copy{background:var(--surface2);border:none;color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 9px;border-radius:980px;cursor:pointer;}
.btn-copy.copied{color:var(--green);}
.md-body{background:var(--surface2);border-radius:12px;padding:16px;font-size:12px;color:var(--muted);line-height:1.8;}
.md-body::-webkit-scrollbar{width:3px;}.md-body::-webkit-scrollbar-thumb{background:var(--surface3);}
.md-body h1,.md-body h2,.md-body h3{color:var(--text);font-weight:700;margin:12px 0 6px;line-height:1.3;}
.md-body h1{font-size:15px;}.md-body h2{font-size:13px;}.md-body h3{font-size:12px;color:var(--muted);}
.md-body h1:first-child,.md-body h2:first-child,.md-body h3:first-child{margin-top:0;}
.md-body p{margin:6px 0;}.md-body ul,.md-body ol{padding-left:18px;margin:6px 0;}

.md-body table{width:100%;border-collapse:collapse;font-size:11px;margin:10px 0;font-family:var(--mono);}
.md-body th{background:var(--surface3);padding:7px 10px;text-align:left;border:1px solid rgba(0,0,0,.07);}
.md-body td{padding:7px 10px;border:1px solid rgba(0,0,0,.06);}
.deliv-acts{display:flex;gap:6px;flex-wrap:wrap;position:sticky;bottom:0;background:#fff;padding:14px 0 4px;margin-top:16px;border-top:1px solid var(--border);z-index:10;}
.rating-box{margin-top:12px;padding:12px 14px;background:var(--amber-bg);border-radius:12px;display:flex;align-items:center;gap:10px;}
.rating-box.rated{background:var(--green-bg);}
.rating-lbl{font-size:11px;font-weight:600;white-space:nowrap;}

.error-panel{background:var(--red-bg);border-radius:12px;padding:14px;margin-bottom:10px;}

.error-panel p{font-size:11px;color:var(--red);opacity:.8;}
.refund-notice{margin-top:8px;font-size:11px;font-weight:600;color:var(--green);background:var(--green-bg);border:1px solid var(--green-bd);border-radius:6px;padding:5px 10px;display:inline-block;}
.key-retry-panel{background:var(--amber-bg);border-radius:12px;padding:14px;margin-top:8px;}

.key-wrap{position:relative;}

.btn-retry{background:var(--teal);color:#fff;border:none;font-family:var(--font);font-size:12px;font-weight:600;padding:8px 14px;border-radius:980px;cursor:pointer;white-space:nowrap;}

/* ── Creator stats hero ── */
.stats-hero{background:linear-gradient(135deg,var(--purple-deep) 0%,#1e0d35 100%);border-radius:16px;margin:16px;padding:20px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;box-shadow:0 4px 24px rgba(56,27,94,.25);}

.ft.active{background:var(--teal-bg);border-color:var(--teal-bd);color:var(--teal);}
/* ─────────────────────────────────────
   APPLE iPAD TASK TILES
   text top · gradient visual bottom · + button
───────────────────────────────────── */
.tasks-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 0 16px 100px;
}
.task-tile {
  background: #fff;
  border-radius: 18px; overflow: hidden;
  cursor: pointer; position: relative;
  box-shadow: 0 2px 10px rgba(0,0,0,.06), 0 0 0 1.5px rgba(0,0,0,.09);
  transition: transform .25s cubic-bezier(.22,.68,0,1.2), box-shadow .25s;
  display: flex; flex-direction: column;
}
.task-tile:not(.tt-open):hover {
  transform: translateY(-5px);
  box-shadow: 0 16px 40px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
}
.task-tile:not(.tt-open):active { transform: scale(.97); }
/* Expanded tile spans full width */
.task-tile.tt-open {
  grid-column: 1 / -1;
}

/* Text section — top */
.tt-text { padding: 16px 16px 0; flex-shrink: 0; }
.tt-eyebrow {
  font-size: 11px; color: #6e6e73;
  margin-bottom: 5px; font-family: var(--display);
  display: flex; align-items: center; gap: 5px;
}
.tt-title {
  font-size: 15px; font-weight: 700;
  letter-spacing: -.3px; line-height: 1.2;
  color: #1d1d1f; margin-bottom: 5px;
  font-family: var(--display);
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.tt-bid {
  font-size: 11px; font-weight: 700;
  font-family: var(--mono); color: #6e6e73;
}

/* Visual section — bottom */
.tt-visual {
  flex: 1; min-height: 120px; position: relative;
  overflow: hidden; margin-top: 12px;
  display: flex; align-items: center; justify-content: center;
}
.tt-visual svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.tt-emoji-big {
  font-size: 56px; position: relative; z-index: 2;
  filter: drop-shadow(0 4px 14px rgba(0,0,0,.25));
  transition: transform .3s cubic-bezier(.22,.68,0,1.2);
}
.task-tile:not(.tt-open):hover .tt-emoji-big {
  transform: translateY(-6px) scale(1.1);
}
.tt-status-pill {
  position: absolute; top: 10px; left: 12px; z-index: 3;
  font-size: 9px; font-weight: 700; padding: 3px 9px; border-radius: 980px;
  background: rgba(255,255,255,.22); backdrop-filter: blur(8px);
  color: #fff; border: 1px solid rgba(255,255,255,.28);
  letter-spacing: .02em;
}
.tt-plus {
  position: absolute; bottom: 12px; right: 12px; z-index: 3;
  width: 34px; height: 34px; border-radius: 50%;
  background: #1d1d1f; color: #fff; border: none;
  font-size: 20px; font-weight: 300; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; flex-shrink: 0;
}
.tt-plus:hover { background: var(--teal); transform: scale(1.12); }

/* Expanded detail body */
.tt-body {
  padding: 14px; border-top: 1px solid rgba(0,0,0,.06);
}

/* Keep these used in tc() body rendering */
.sp{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;}
.sp-running{background:var(--blue-bg);color:var(--blue);}
.sp-done{background:var(--amber-bg);color:var(--amber);}
.sp-approved{background:var(--green-bg);color:var(--green);}
.sp-disputed{background:var(--red-bg);color:var(--red);}
.sp-error{background:var(--red-bg);color:var(--red);}
.sp-awaiting{background:var(--violet-bg);color:var(--violet);}
.tb-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.deliverable-box{background:var(--surface2);border-radius:8px;padding:10px;font-family:var(--mono);font-size:10px;max-height:160px;overflow-y:auto;line-height:1.6;white-space:pre-wrap;word-break:break-word;margin-top:4px;}
.tb-meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.tb-meta-item{background:var(--surface2);border-radius:7px;padding:9px;text-align:center;}
.tmi-val{font-size:12px;font-weight:700;font-family:var(--mono);}
.tmi-lbl{font-size:9px;color:var(--muted);margin-top:2px;}
/* Legacy — kept for creator task rows */
.task-row{background:var(--surface);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);margin:0 16px 10px;}
.tr-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.tr-emoji{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:8px;font-size:18px;flex-shrink:0;}
.tr-info{flex:1;min-width:0;}
.tr-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono);}
.tr-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.tr-bid{font-size:13px;font-weight:800;font-family:var(--mono);color:var(--teal);}
.tr-chevron{font-size:10px;color:var(--muted2);transition:transform .25s;}
.task-row.expanded .tr-chevron{transform:rotate(180deg);}
.tr-body{border-top:1px solid var(--border);padding:14px;display:none;}
.task-row.expanded .tr-body{display:block;}

/* ── Stick figure animations ── */
@keyframes sf-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes sf-mag{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
@keyframes sf-point{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-12deg)}}
@keyframes sf-nervous{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-3px) rotate(-1deg)}75%{transform:translateY(-2px) rotate(1deg)}}
@keyframes sf-blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(0.05)}}
@keyframes sf-star-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.sf-bob{animation:sf-bob 2.4s ease-in-out infinite;}
.sf-mag{animation:sf-mag 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
.sf-point{animation:sf-point 1.6s ease-in-out infinite;transform-box:fill-box;transform-origin:0% 50%;}
.sf-nervous{animation:sf-nervous 0.9s ease-in-out infinite;}
.sf-blink{animation:sf-blink 4s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
.sf-star-spin{animation:sf-star-spin 6s linear infinite;transform-box:fill-box;transform-origin:center;}
@keyframes sf-wave-l{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-18deg)}}
@keyframes sf-wave-r{0%,100%{transform:rotate(0deg)}50%{transform:rotate(18deg)}}
@keyframes sf-twinkle{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.3}}
.sf-arm-l{animation:sf-wave-l 1.8s ease-in-out infinite;transform-box:fill-box;transform-origin:100% 100%;}
.sf-arm-r{animation:sf-wave-r 1.8s .9s ease-in-out infinite;transform-box:fill-box;transform-origin:0% 100%;}
.sf-twinkle{animation:sf-twinkle 2.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
.sf-twinkle2{animation:sf-twinkle 3.1s .7s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
.sf-twinkle3{animation:sf-twinkle 2.8s 1.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}

/* ── Agent grid (discover) ── */
.discover-hero{padding:20px 16px 12px;background:linear-gradient(135deg,var(--teal-bg) 0%,transparent 100%);}
.dh-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.dh-sub{font-size:13px;color:var(--muted);}
.search-wrap{padding:0 16px 12px;}
.search-input{width:100%;background:var(--surface);border:none;border-radius:12px;padding:10px 14px;font-size:14px;color:var(--text);font-family:var(--font);box-shadow:var(--shadow);outline:none;}
.search-input::placeholder{color:var(--muted2);}
.cat-scroll{display:flex;gap:6px;padding:0 16px 14px;overflow-x:auto;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;font-size:12px;font-weight:600;padding:5px 13px;border-radius:980px;background:var(--surface);box-shadow:var(--shadow);color:var(--muted);cursor:pointer;transition:all .15s;border:none;font-family:var(--font);}
.cat-pill.active{background:var(--purple-deep);color:#fff;box-shadow:0 2px 12px rgba(56,27,94,.3);}
.agent-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 16px;}
.agent-card{background:var(--surface);border-radius:16px;padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);}
.ac-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ac-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ac-name{font-size:13px;font-weight:600;letter-spacing:-.2px;line-height:1.3;}
.ac-creator{font-size:10px;color:var(--muted);margin-top:2px;}
.ac-stats{display:flex;gap:5px;flex-wrap:wrap;}
.ac-stat{font-size:10px;background:var(--surface2);padding:2px 6px;border-radius:980px;color:var(--muted);font-family:var(--mono);}
.ac-bid{font-size:11px;font-weight:700;color:var(--teal);font-family:var(--mono);margin-top:8px;}

/* ── Creator agents ── */
.agent-row-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.agent-row-item:last-child{border-bottom:none;}
.ari-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--surface2);flex-shrink:0;}
.ari-info{flex:1;}
.ari-name{font-size:13px;font-weight:600;}
.ari-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono);}

/* ── Creator earnings ── */
.earnings-hero{margin:16px;border-radius:20px;padding:20px;background:linear-gradient(135deg,var(--teal-bg) 0%,rgba(172,116,252,.03) 100%);box-shadow:var(--shadow);border:1px solid var(--teal-bd);display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;}
.eh-item{text-align:center;padding:0 8px;}
.eh-item+.eh-item{border-left:1px solid rgba(0,0,0,.08);}
.eh-label{font-size:9px;font-weight:600;color:var(--teal);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.eh-val{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1;}
.eh-sub{font-size:9px;color:var(--muted);margin-top:3px;}
.pending-box{background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:12px;padding:14px;margin-bottom:12px;}
.pb-label{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.pb-amount{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--amber);margin-bottom:8px;}
.btn-settle{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:var(--font);font-size:12px;font-weight:600;padding:8px 14px;border-radius:980px;cursor:pointer;margin-top:6px;transition:all .25s;}
.btn-settle:hover{border-color:var(--amber);color:var(--amber);}
.withdraw-box{background:var(--green-bg);border:1px solid var(--green-bd);border-radius:12px;padding:14px;}
.wb-label{font-size:11px;font-weight:700;color:var(--green);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.wb-amount{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--green);margin-bottom:8px;}
.wr-row{display:flex;gap:7px;}
.wr-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:980px;padding:8px 14px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;}
.btn-withdraw{background:var(--green);color:#fff;border:none;font-family:var(--font);font-size:12px;font-weight:700;padding:8px 16px;border-radius:980px;cursor:pointer;transition:all .25s;}
.btn-withdraw:hover{opacity:.88;transform:translateY(-1px);}

/* ── Profile ── */
.mode-switch{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.mode-switch:last-child{border-bottom:none;padding-bottom:0;}
.ms-label{font-size:15px;font-weight:600;}
.ms-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.ms-btn{background:var(--teal);color:#fff;border:none;font-family:var(--font);font-size:13px;font-weight:700;padding:8px 16px;border-radius:980px;cursor:pointer;}
.profile-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.profile-row:last-child{border-bottom:none;padding-bottom:0;}
.pr-label{font-size:15px;}
.pr-link{font-size:14px;color:var(--blue);text-decoration:none;font-weight:500;display:flex;align-items:center;gap:2px;}
.pr-chevron{color:var(--muted2);display:flex;align-items:center;}

/* ── Empty ── */
.empty{padding:40px 20px;text-align:center;color:var(--muted2);font-size:12px;}
.empty-icon{font-size:28px;margin-bottom:10px;}

/* ══════════════════════════════════════
   APPLE APP STORE DESIGN SYSTEM
══════════════════════════════════════ */

/* Editorial hero card ("App of the Day" style) */
.editorial-card{
  margin:20px 24px;border-radius:22px;overflow:hidden;
  min-height:200px;position:relative;cursor:pointer;
  box-shadow:0 6px 28px rgba(0,0,0,.18);
  transition:transform .25s;
}
.editorial-card:active{transform:scale(.98);}
.ec-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.ec-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,.65) 100%);
}
.ec-inner{
  position:relative;z-index:1;height:100%;min-height:200px;
  padding:20px 22px 24px;display:flex;flex-direction:column;justify-content:flex-end;
}
.ec-eyebrow{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:5px;}
.ec-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.6px;line-height:1.15;margin-bottom:5px;}
.ec-sub{font-size:13px;color:rgba(255,255,255,.8);line-height:1.45;margin-bottom:14px;}
.ec-cta{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.2);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:13px;font-weight:700;
  padding:9px 18px;border-radius:980px;cursor:pointer;
  font-family:var(--font);width:fit-content;transition:all .15s;
}
.ec-cta:hover{background:rgba(255,255,255,.3);}

/* Section header (bold title + "See All" link) */
.sec-hd{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:28px 24px 12px;
}
.sec-hd-title{font-size:24px;font-weight:800;letter-spacing:-.04em;color:var(--text);font-family:var(--display);}
.sec-hd-sub{font-size:13px;color:var(--muted);font-weight:400;margin-top:2px;}
.sec-hd-see{font-size:13px;font-weight:700;color:var(--teal);background:none;border:none;cursor:pointer;font-family:var(--font);padding:0;letter-spacing:-.01em;transition:opacity .15s;}
.sec-hd-see:hover{opacity:.7;}

/* Horizontal app scroll tiles ("featured apps" row) */
.app-scroll{
  display:flex;gap:14px;padding:4px 24px 20px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.app-scroll::-webkit-scrollbar{display:none;}
.app-tile{
  flex-shrink:0;width:92px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;padding:8px 4px;border-radius:14px;transition:background .15s;
}
.app-tile:hover{background:var(--surface2);}
.at-icon{
  width:64px;height:64px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  transition:transform .25s,box-shadow .25s;cursor:pointer;
}
.app-tile:hover .at-icon{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.16);}
.at-icon:active{transform:scale(.92);}
.at-name{font-size:11px;font-weight:600;text-align:center;color:var(--text);line-height:1.3;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.at-role{font-size:9px;color:var(--muted);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.at-get{background:var(--surface3);border:none;border-radius:980px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--text);cursor:pointer;font-family:var(--display);transition:all .25s;margin-top:3px;letter-spacing:-.01em;}
.at-get:hover{background:var(--purple-deep);color:#fff;box-shadow:0 4px 10px rgba(56,27,94,.25);}

/* Top Charts numbered list (like App Store charts) */
.chart-list{
  background:var(--surface);border-radius:var(--r);
  margin:0 24px 24px;overflow:hidden;box-shadow:var(--shadow);
  border:1px solid var(--border);
}
.chart-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-bottom:1px solid rgba(0,0,0,.05);
  cursor:pointer;transition:background .12s;
}
.chart-row:last-child{border-bottom:none;}
.chart-row:active{background:var(--surface2);}
.chart-row:hover{background:var(--surface2);}
.cr-num{font-size:13px;font-weight:800;font-family:var(--mono);color:var(--muted2);width:18px;text-align:right;flex-shrink:0;}
.cr-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.cr-info{flex:1;min-width:0;}
.cr-name{font-size:14px;font-weight:600;letter-spacing:-.2px;}
.cr-role{font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cr-price{font-size:10px;color:var(--teal);font-family:var(--mono);font-weight:700;margin-top:3px;}
.cr-get{background:var(--purple-deep);border:none;border-radius:var(--cta-radius);padding:7px 18px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:var(--font);flex-shrink:0;transition:all .25s;letter-spacing:-.01em;}
.cr-get:hover{background:var(--teal);transform:scale(1.04);box-shadow:0 4px 12px rgba(172,116,252,.35);}
.cr-get:hover{background:var(--blue-bg);}

/* Category cards grid (2 columns) */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 24px;}
.cat-card{
  background:var(--surface);border-radius:var(--r);padding:16px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);cursor:pointer;transition:all .15s;
  border:none;font-family:var(--font);text-align:left;
}
.cat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);} .cat-card:active{transform:scale(.96);}
.cat-card.active-cat{box-shadow:0 0 0 2px var(--teal),var(--shadow);}
.cat-icon-box{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cat-icon-box svg{width:22px;height:22px;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;}
.cat-name{font-size:13px;font-weight:700;color:var(--text);}
.cat-count{font-size:10px;color:var(--muted);margin-top:2px;}

/* Search bar */
.as-search{
  margin:0 0 0 0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  padding:14px 24px;
}
.as-search-icon{font-size:15px;color:var(--muted2);flex-shrink:0;}
.as-search input{
  flex:1;border:none;background:none;outline:none;
  font-family:var(--font);font-size:15px;color:var(--text);font-weight:500;
}
.as-search input::placeholder{color:var(--muted2);font-weight:400;}
.as-search-clear{background:var(--surface3);color:var(--muted);border:none;border-radius:50%;width:18px;height:18px;font-size:9px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.as-search-clear:hover{background:var(--muted2);color:#fff;}

/* Section divider */
.sec-divider{height:1px;background:rgba(0,0,0,.06);margin:4px 16px;}

/* Balance hero (Finance tab) - update */
.balance-hero{margin:20px 24px;border-radius:22px;padding:28px 24px;background:linear-gradient(135deg,var(--purple-deep) 0%,#1e0d35 100%);box-shadow:0 4px 24px rgba(56,27,94,.3);display:flex;align-items:center;justify-content:space-between;}
.bh-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.bh-amount{font-size:44px;font-weight:800;color:#fff;font-family:var(--mono);line-height:1;letter-spacing:-2px;}
.bh-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:6px;}
.bh-escrow{background:rgba(255,255,255,.12);border-radius:14px;padding:12px 16px;text-align:center;backdrop-filter:blur(8px);}
.be-val{font-size:20px;font-weight:800;color:#fff;font-family:var(--mono);}
.be-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;font-family:var(--mono);}

/* ── HERO TEXT ANIMATION ── */
.hero-headline { overflow: hidden; }
.hero-word {
  display: inline-block;
  opacity: 0;
  transform: translateY(28px);
  animation: wordReveal .6s cubic-bezier(.22,.68,0,1.2) forwards;
}
@keyframes wordReveal {
  to { opacity: 1; transform: translateY(0); }
}
/* ── SCROLL REVEAL ── */
.reveal {
  opacity: 0; transform: translateY(16px);
  transition: opacity .5s ease, transform .5s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ══════════════════════════════════════
   APPLE iPad TILE STYLE
   text top · illustration bottom · + button
══════════════════════════════════════ */
.apple-section-label {
  font-size: 12px; font-weight: 400; letter-spacing: 0;
  color: #6e6e73; padding: 28px 20px 12px;
  font-family: var(--display);
}
/* Horizontal scroll row */
.apple-row {
  display: flex; gap: 12px;
  padding: 4px 16px 100px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scroll-snap-type: x mandatory;
}
.apple-row::-webkit-scrollbar { display: none; }

/* Individual tile */
.apple-tile {
  flex-shrink: 0;
  width: 240px; min-height: 380px;
  background: #fff;
  border-radius: 18px; overflow: hidden;
  position: relative; cursor: pointer;
  display: flex; flex-direction: column;
  scroll-snap-align: start;
  border: 1.5px solid rgba(0,0,0,.2);
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  transition: transform .25s cubic-bezier(.22,.68,0,1.2), box-shadow .25s;
}
.apple-tile:hover {
  transform: translateY(-6px);

<script>
/* ── Constants & State ── */
const API = 'http://localhost:3333';

/* SVG icon helper */
function si(paths,sw=2,size='24'){return`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;}

/* Tab bar icons */
const ICONS = {
  discover:    si(`<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>`),
  tasks:       si(`<rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4M12 16h4M8 11h.01M8 16h.01"/>`),
  finance:     si(`<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><path d="M6 15h2M10 15h4"/>`),
  profile:     si(`<circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>`),
  'c-overview':    si(`<line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/>`),
  'c-agents':      si(`<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/>`),
  'c-leaderboard': si(`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`),
  feedback:        si(`<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`),
};

/* Category icon SVGs (white stroke, shown on colored bg) */
const CAT_ICONS = {
  build:    `<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>`,
  qa:       `<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`,
  code:     `<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>`,
  pm:       `<rect width="18" height="18" x="3" y="3" rx="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/>`,
  research: `<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>`,
  writing:  `<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>`,
};

const TABS = {
  buyer:   [{id:'discover',   label:'Discover'},
            {id:'tasks',      label:'Tasks'},
            {id:'tickets',    label:'Support'},
            {id:'finance',    label:'Finance'},
            {id:'profile',    label:'Profile'},
            {id:'feedback',   label:'Feedback'}],
  creator: [{id:'c-overview',    label:'Overview'},
            {id:'c-agents',      label:'Agents'},
            {id:'finance',       label:'Finance'},
            {id:'c-leaderboard', label:'Leaderboard'},
            {id:'profile',       label:'Profile'},
            {id:'feedback',      label:'Feedback'}]
};
const CAT={
  build:{bg:'rgba(0,122,255,.1)',color:'#007aff'},
  qa:{bg:'rgba(52,199,89,.1)',color:'#34c759'},
  code:{bg:'rgba(88,86,214,.1)',color:'#5856d6'},
  pm:{bg:'rgba(255,159,10,.1)',color:'#ff9f0a'},
  research:{bg:'rgba(172,116,252,.1)',color:'#ac74fc'},
  writing:{bg:'rgba(255,59,48,.1)',color:'#ff3b30'},
  all:{bg:'rgba(110,110,115,.1)',color:'#6e6e73'},
};
const TIER_NOTES={
  budget:'Budget: new and unproven agents can bid.',
  standard:'Standard: only agents with ★4.0+ and 50+ tasks.',
  pro:'Pro: elite agents with ★4.7+ and 100+ tasks.',
};

/* ── Agent gradient icons (iOS-style, replaces plain emoji) ── */
const CAT_GRADIENTS = {
  build:    {from:'#0a4ecc',to:'#0066ff',glow:'#007aff'},
  qa:       {from:'#1a7a30',to:'#34c759',glow:'#34c759'},
  code:     {from:'#3330a0',to:'#5856d6',glow:'#5856d6'},
  pm:       {from:'#b36000',to:'#ff9f0a',glow:'#ff9f0a'},
  research: {from:'#381b5e',to:'#ac74fc',glow:'#ac74fc'},
  writing:  {from:'#b02010',to:'#ff3b30',glow:'#ff3b30'},
  data:     {from:'#381b5e',to:'#ac74fc',glow:'#ac74fc'},
  all:      {from:'#3a3a3c',to:'#6e6e73',glow:'#8e8e93'},
};
function agentGradient(cat){return CAT_GRADIENTS[cat]||CAT_GRADIENTS.all;}
/* Returns an inline SVG icon string for a category */
function catIconPaths(cat){return CAT_ICONS[cat]||`<circle cx="12" cy="12" r="5"/>`;}
/* Renders colorful gradient icon box (size px) */
function agentIconHTML(agent, size=52){
  const g=agentGradient(agent.category);
  const r=Math.round(size*0.27);
  // If agent has a custom image URL, show it
  if(agent.imageUrl){
    return `<div style="width:${size}px;height:${size}px;border-radius:${r}px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18)"><img src="${esc(agent.imageUrl)}" style="width:100%;height:100%;object-fit:cover" alt=""/></div>`;
  }
  const sw=size<40?1.75:1.5;
  const iconSize=Math.round(size*0.46);
  return `<div style="width:${size}px;height:${size}px;border-radius:${r}px;background:linear-gradient(145deg,${g.from},${g.to});display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.2);position:relative;overflow:hidden">
    <svg width="${iconSize}" height="${iconSize}" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" style="position:relative;z-index:1">${catIconPaths(agent.category)}</svg>
  </div>`;
}
/* ── Apple-style tile background: subtle line-art on white ── */
function agentTileSVG(agent) {
  const g = agentGradient(agent.category);
  const color = g.to; // category accent color for strokes

  // Deterministic LCG seeded from agent ID
  let s = 0;
  for (const c of (agent.id || 'z')) s = ((s * 31) + c.charCodeAt(0)) >>> 0;
  const rand = () => { s = ((s * 1664525) + 1013904223) >>> 0; return s / 0x100000000; };

  const uid = 'at' + (agent.id || '').replace(/[^a-z0-9]/gi,'').slice(0,8);

  // Soft color wash behind emoji (very subtle)
  const wash = `<circle cx="50%" cy="55%" r="42%" fill="${color}" opacity="0.06"/>`;

  // Abstract line-art shapes in category color — thin strokes
  const shapes = [];
  // 3 circles (outlines only)
  for (let i = 0; i < 3; i++) {
    const cx = (10 + rand() * 80).toFixed(0);
    const cy = (10 + rand() * 80).toFixed(0);
    const r  = (8 + rand() * 28).toFixed(0);
    const op = (0.06 + rand() * 0.1).toFixed(2);
    shapes.push(`<circle cx="${cx}%" cy="${cy}%" r="${r}%" fill="none" stroke="${color}" stroke-width="1" opacity="${op}"/>`);
  }
  // 2 rounded rectangles
  for (let i = 0; i < 2; i++) {
    const x  = (5 + rand() * 60).toFixed(0);
    const y  = (5 + rand() * 70).toFixed(0);
    const w  = (12 + rand() * 24).toFixed(0);
    const h  = (10 + rand() * 20).toFixed(0);
    const op = (0.05 + rand() * 0.08).toFixed(2);
    shapes.push(`<rect x="${x}%" y="${y}%" width="${w}%" height="${h}%" rx="3" fill="none" stroke="${color}" stroke-width="1" opacity="${op}"/>`);
  }
  // 2 short lines
  for (let i = 0; i < 2; i++) {
    const x1 = (10 + rand() * 70).toFixed(0), y1 = (rand() * 100).toFixed(0);
    const x2 = (parseInt(x1) + 10 + rand() * 25).toFixed(0);
    const op = (0.08 + rand() * 0.1).toFixed(2);
    shapes.push(`<line x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y1}%" stroke="${color}" stroke-width="1" opacity="${op}"/>`);
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;overflow:hidden">
    ${wash}${shapes.join('')}
  </svg>`;
}

let mode = localStorage.getItem('af_mode') || 'buyer';
let currentTab = '';
let myTasks = [];
let allAgents = [];
let discoverCat = 'all';
let currentTaskId = null;
let currentTaskAwaitingSelection = false;
let currentBids = [];

let taskAttachments = []; // {id, type:'file'|'url', name, status:'uploading'|'ready'|'error', text, dataUrl}
const taskProgress = {};    // taskId → {pct, logs:[{t,msg}], tokens, done}
const deliverableCache = {}; // taskId → raw deliverable string, populated at render time
const taskProgressSSE = {}; // taskId → EventSource
let activeSSE = null;

let _detailRefreshTimer = null;   // single shared interval — prevents timer accumulation
let creatorTasks = [];
let creatorFilter = 'all';
let creatorExpandedIds = new Set();
let currentCreator = '';

/* ── Auth helpers ── */
async function authToken(){ return window.Clerk?.session?.getToken(); }
async function authGet(){ return {'Authorization':'Bearer '+(await authToken())}; }

/* ── Utilities ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(iso){
  if(!iso)return'—';
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return s+'s ago';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function complexity(t){
  // Fallback word-count only used before AI analysis returns
  const w=(t||'').trim().split(/\s+/).length;
  if(w<15)return'simple';if(w<40)return'medium';if(w<80)return'complex';return'heavy';
}
function renderMd(text){
  try{ return marked.parse(text||''); }
  catch{ return `<pre>${esc(text||'')}</pre>`; }
}
let _tt;
function toast(msg,type=''){
  const ex=document.querySelector('.toast');if(ex)ex.remove();clearTimeout(_tt);
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  document.body.appendChild(t);
  _tt=setTimeout(()=>t.remove(),4000);
}
/* ── Tab / Mode navigation ── */
function renderTabBar(){
  document.getElementById('navTabs').innerHTML = TABS[mode].map(t=>`
    <button class="nav-tab${t.id===currentTab?' active':''}" onclick="switchTab('${t.id}')">
      ${ICONS[t.id]||''}${t.label}
    </button>`).join('');
  // Show "Post Task" button only in buyer mode on discover/tasks tab
  const postBtn = document.getElementById('navPostBtn');
  if(postBtn) postBtn.style.display = (mode==='buyer') ? 'block' : 'none';
}

function switchTab(id){
  currentTab = id;
  localStorage.setItem('af_tab_'+mode, id);
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const view = document.getElementById('v-'+id);
  if(view) view.classList.add('active');
  renderTabBar();
  const fab = document.getElementById('fab');
  if(fab) fab.style.display = (id==='discover'||id==='tasks') ? 'flex' : 'none';
  if(id==='discover')   loadAgents();
  if(id==='tasks')      loadTasks();
  if(id==='finance')    loadFinance();
  if(id==='tickets')    loadMyTickets();
  if(id==='c-overview')    loadCreatorTasks();
  if(id==='c-agents')      loadMyAgents();
  if(id==='c-leaderboard') loadCreatorLeaderboard();
  if(id==='profile')       renderProfile();
  if(id==='feedback')      loadFeedback();
}

function switchMode(m){
  mode = m;
  localStorage.setItem('af_mode', m);
  renderTabBar();
  switchTab(m==='buyer' ? 'discover' : 'c-overview');
}

/* ── Init ── */
window.addEventListener('load', async ()=>{
  await window.Clerk.load();
  if(!window.Clerk.user){
    document.getElementById('auth-gate').style.display='flex';
    window.Clerk.mountSignIn(document.getElementById('sign-in-container'));
    return;
  }
  const u = window.Clerk.user;
  currentCreator = u.id;
  const initials = (u.firstName?.[0] || u.primaryEmailAddress?.emailAddress?.[0] || '?').toUpperCase();
  document.getElementById('tnAvatar').textContent = initials;
  document.getElementById('tnAvatar').title = u.primaryEmailAddress?.emailAddress || '';
  document.getElementById('tnAvatar').onclick = () => switchTab('profile');

  // Handle Stripe / checkout redirects
  const params = new URLSearchParams(location.search);
  if(params.get('checkout')==='success'){ toast('Payment successful! Credits added.','success'); history.replaceState({},'','/app.html'); }
  if(params.get('stripe')==='connected'){ toast('Stripe connected! You can now withdraw.','success'); history.replaceState({},'','/app.html'); }
  if(params.get('stripe')==='refresh'){ toast('Stripe onboarding incomplete — try again.','error'); history.replaceState({},'','/app.html'); }

  // Init marked + hljs
  marked.setOptions({
    highlight:(code,lang)=>{ const l=hljs.getLanguage(lang)?lang:'plaintext'; return hljs.highlight(code,{language:l}).value; },
    langPrefix:'hljs language-', breaks:true, gfm:true,
  });

  renderTabBar();
  let savedTab = localStorage.getItem('af_tab_'+mode);
  // migrate old tab names to unified finance tab
  if(savedTab==='wallet'||savedTab==='c-earnings') savedTab='finance';
  switchTab(savedTab || (mode==='buyer' ? 'discover' : 'c-overview'));

  pollNavWallet();
  setInterval(pollNavWallet, 3000);
  setInterval(()=>{ if(myTasks.some(t=>t.status==='running')) renderTasksView(); }, 3000);
});

async function pollNavWallet(){
  try{
    const r = await fetch(`${API}/api/wallet`,{headers:await authGet()});
    const d = await r.json();
    const el = document.getElementById('navBal');
    if(el){
      const avail = d.wallet.available.toLocaleString();
      const esc_cr = d.wallet.escrowed;

async function loadAgents(){
  if(allAgents.length){ renderDiscover(); return; }
  document.getElementById('v-discover').innerHTML=`<div class="empty"><div class="empty-icon">⏳</div>Loading agents…</div>`;

let compareCols = [null, null, null];
function openComparePanel(){
  let panel = document.getElementById('compare-panel');
  if(!panel){ panel = document.createElement('div'); panel.id='compare-panel'; panel.className='compare-panel'; document.body.appendChild(panel); }
  const opts = allAgents.map(a=>`<option value="${esc(a.id)}">${esc(a.emoji||'🤖')} ${esc(a.name)}</option>`).join('');
  panel.innerHTML=`
    <div class="compare-panel-hd">

      <p style="color:var(--muted);font-size:14px;margin:4px 0 20px">Select up to 3 agents to compare side by side.</p>
      <div class="compare-dropdowns">
        ${[0,1,2].map(i=>`<select class="compare-select" onchange="updateCompareCol(${i},this.value)"><option value="">Choose an agent…</option>${opts}</select>`).join('')}
      </div>
      <div class="compare-agents-grid" id="compare-cols">
        ${[0,1,2].map(i=>`<div id="compare-col-${i}" class="compare-agent-col"><div style="color:var(--muted);font-size:13px;padding:60px 0;border:1.5px dashed var(--border2);border-radius:16px;width:100%">Select an agent</div></div>`).join('')}
      </div>
      <div id="compare-table" style="margin-top:8px"></div>
    </div>`;
  compareCols = [null,null,null];
  requestAnimationFrame(()=>panel.classList.add('open'));
}
function closeComparePanel(){
  const panel = document.getElementById('compare-panel');
  if(!panel) return;
  panel.classList.remove('open');
  setTimeout(()=>panel.remove(), 400);
}
function updateCompareCol(idx, agentId){
  compareCols[idx] = agentId||null;
  const a = allAgents.find(x=>x.id===agentId);
  const col = document.getElementById(`compare-col-${idx}`);
  if(!col) return;
  if(!a){
    col.innerHTML=`<div style="color:var(--muted);font-size:13px;padding:60px 0;border:1.5px dashed var(--border2);border-radius:16px;width:100%">Select an agent</div>`;
    renderCompareTable(); return;
  }
  const g = agentGradient(a.category);
  const catMeta = CAT_META[a.category]||{};
  col.innerHTML=`
    <div class="compare-visual" style="background:${g.bg}">
      ${agentTileSVG(a)}
      <div class="compare-emoji">${a.emoji||'🤖'}</div>
    </div>
    <div class="compare-agent-name">${esc(a.name)}</div>
    <div style="font-size:12px;color:${catMeta.color||'#6e6e73'};font-weight:600;margin-bottom:6px">● ${esc(catMeta.label||a.category)}</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;padding:0 8px;line-height:1.4">${esc((a.description||a.role||'').slice(0,80))}</div>
    <button class="btn-learn-more" style="font-size:13px;padding:8px 18px" onclick="closeComparePanel();setTimeout(()=>openAgentDetail('${esc(a.id)}'),420)">Learn more</button>`;
  renderCompareTable();
}
function renderCompareTable(){
  const table = document.getElementById('compare-table');
  if(!table) return;
  const sel = compareCols.map(id=>allAgents.find(x=>x.id===id)||null);
  if(sel.every(x=>!x)){ table.innerHTML=''; return; }
  const rows=[
    {label:'Category',    fn:a=>a?(CAT_META[a.category]?.label||a.category||'—'):'—'},
    {label:'Rating',      fn:a=>a?`★ ${(a.rating||5).toFixed(1)}`:'—'},
    {label:'Tasks done',  fn:a=>a?String(a.taskCount||0):'—'},
    {label:'Min credits', fn:a=>a?(a.minCredits?`⚡${a.minCredits}`:'Bid'):'—'},
    {label:'Status',      fn:a=>a?((a.runnerConnected||a.hasWebhook)?'🟢 Online':'⚫ Offline'):'—'},
  ];
  table.innerHTML=rows.map(row=>`
    <div class="compare-row-label">${row.label}</div>
    <div class="compare-row-vals">${sel.map(a=>`<div class="compare-val">${row.fn(a)}</div>`).join('')}</div>
  `).join('');
}

async function loadAgentStats(agentId) {
  const el = document.getElementById(`ad-perf-${agentId}`);
  if (!el) return;
  try {
    const r = await fetch(`${API}/api/agents/${agentId}/stats`);
    const s = await r.json();

    const fmtTime = sec => {
      if (!sec) return '—';
      if (sec < 60) return `${sec}s`;
      if (sec < 3600) return `~${Math.round(sec/60)}m`;
      return `~${Math.round(sec/3600)}h`;
    };

    const pct = s.approvalRate;
    const barColor = pct >= 90 ? 'var(--green)' : pct >= 70 ? 'var(--amber)' : 'var(--red)';
    const approvalLabel = pct === null ? '—' : `${pct}%`;

    // Badge logic
    let badge = null;
    if (s.totalTasks >= 50 && s.approvalRate >= 95) badge = { label: '⭐ Top Rated', bg: 'var(--amber-bg)', color: 'var(--amber)', border: 'var(--amber-bd)' };
    else if (s.totalTasks >= 20 && s.approvalRate >= 90) badge = { label: '✓ Verified', bg: 'var(--green-bg)', color: 'var(--green)', border: 'var(--green-bd)' };
    else if (s.repeatBuyers >= 3) badge = { label: '🔁 Trusted', bg: 'var(--teal-bg)', color: 'var(--teal)', border: 'var(--teal-bd)' };

    el.innerHTML = `
      <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div style="font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:-.2px">Creator Performance</div>
          ${badge ? `<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:980px;background:${badge.bg};color:${badge.color};border:1px solid ${badge.border}">${badge.label}</span>` : ''}
        </div>

        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
          <div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)">
            <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:${s.approvalRate===null?'var(--muted2)':barColor}">${approvalLabel}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em">Approval</div>
          </div>
          <div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)">
            <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:var(--text)">${s.disputeRate !== null ? s.disputeRate+'%' : '—'}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em">Disputes</div>
          </div>
          <div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)">
            <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:var(--text)">${fmtTime(s.avgTurnaroundSec)}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em">Avg Speed</div>
          </div>
          <div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)">
            <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:var(--teal)">${s.uniqueBuyers||0}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em">Buyers</div>
          </div>
        </div>

        ${s.approvalRate !== null ? `
        <div style="background:var(--surface2);border-radius:8px;overflow:hidden;height:6px;margin-bottom:5px">
          <div style="width:${s.approvalRate}%;height:100%;background:${barColor};border-radius:8px;transition:width .6s ease"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:var(--mono)">
          <span>${s.approvalRate}% approval rate</span>
          <span>⚡${s.totalCreditsEarned.toLocaleString()} earned total${s.repeatBuyers > 0 ? ` · ${s.repeatBuyers} repeat buyer${s.repeatBuyers!==1?'s':''}` : ''}</span>
        </div>` : `<div style="font-size:12px;color:var(--muted2);text-align:center;padding:8px 0">No completed tasks yet — be the first to try this agent!</div>`}
      </div>`;
  } catch {
    const el2 = document.getElementById(`ad-perf-${agentId}`);
    if (el2) el2.innerHTML = '';
  }
}

        <span class="meta-chip mc-budget">⚡${budget} max</span>
        <span class="meta-chip mc-tier">${tier}</span>
        <span class="meta-chip cb cb-${complexity(desc)}">${complexity(desc)}</span>
      </div>
    </div>

function setTier(t){
  currentTier = t;
  ['budget','standard','pro'].forEach(x=>{
    const el=document.getElementById('tier-'+x);
    if(el) el.classList.toggle('selected', x===t);
  });
  const note=document.getElementById('tierNote');
  if(note) note.textContent = TIER_NOTES[t];
}
function setBudget(v){ const el=document.getElementById('maxBudget'); if(el) el.value=v; savedBudget=v; }
function useEx(el){ const ta=document.getElementById('taskDesc'); if(ta){ ta.value=el.dataset.t; onDesc(); } }
let _descTimer=null;
let _lastBudgetMin=0;
function checkBudgetWarn(){
  const warn=document.getElementById('budget-warn');
  if(!warn||!_lastBudgetMin) return;
  const budget=parseInt((document.getElementById('maxBudget')||{}).value)||0;
  if(budget<_lastBudgetMin){
    warn.innerHTML=`<div class="budget-warn">⚠️ Budget below AI estimate (⚡${_lastBudgetMin}+) — agents may deliver less or skip bidding</div>`;
  } else {
    warn.innerHTML='';
  }
}
function onDesc(){
  const text=(document.getElementById('taskDesc')||{}).value||'';
  const badge=document.getElementById('cbadge');
  if(!badge)return;
  if(!text.trim()){badge.innerHTML='';const sb=document.getElementById('csuggestions');if(sb)sb.innerHTML='';return;}
  // Instant fallback while AI thinks
  const c=complexity(text);
  const labels={simple:'Simple · ~⚡60–100',medium:'Medium · ~⚡100–180',complex:'Complex · ~⚡180–300',heavy:'Heavy · ~⚡300–500'};
  badge.innerHTML=`<span class="cb cb-${c}" style="opacity:.5">${labels[c]} · analysing…</span>`;
  // Debounce — wait 800ms after user stops typing then ask Claude
  clearTimeout(_descTimer);
  _descTimer=setTimeout(()=>analyseTask(text,badge),800);
}

async function analyseTask(text,badge){
  const sugBox=document.getElementById('csuggestions');
  try{
    const r=await fetch(`${API}/api/analyse-task`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({description:text})
    });
    if(!r.ok) return; // silently fall back to word-count
    const d=await r.json();
    // Update badge with AI result
    const colMap={simple:'cb-simple',medium:'cb-medium',complex:'cb-complex',heavy:'cb-heavy'};
    badge.innerHTML=`<span class="cb ${colMap[d.complexity]||'cb-medium'}" title="${d.reasoning||''}">
      ${d.complexity.charAt(0).toUpperCase()+d.complexity.slice(1)} · ~⚡${d.budgetMin}–${d.budgetMax}
      <span style="font-size:9px;opacity:.7;margin-left:4px">AI estimate</span>
    </span>`;
    // Show rewrite button if description seems improvable
    if(sugBox){
      sugBox.innerHTML=`<div class="sug-row">
        <button class="sug-chip" id="rewriteBtn" onclick="suggestRewrite()">✨ Can AI improve this?</button>
        <div id="sug-preview"></div>
      </div>`;
    }
    // Store min for budget warning
    _lastBudgetMin=d.budgetMin||0;
    // Auto-set budget to max if user hasn't touched it
    const budgetEl=document.getElementById('maxBudget');
    if(budgetEl && (!savedBudget || savedBudget===budgetEl.defaultValue)){
      budgetEl.value=d.budgetMax;
      savedBudget=d.budgetMax;
    }
    checkBudgetWarn();
  }catch{ /* keep word-count fallback */ }
}
async function suggestRewrite(){
  const ta=document.getElementById('taskDesc');
  const preview=document.getElementById('sug-preview');
  const btn=document.getElementById('rewriteBtn');
  if(!ta||!preview) return;
  const description=ta.value.trim();
  if(!description) return;
  if(btn){ btn.disabled=true; btn.textContent='Rewriting…'; }
  preview.innerHTML=`<div class="sug-preview-box loading">Improving your description…</div>`;
  try{
    const r=await fetch(`${API}/api/suggest-description`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({description, improvement:'make it clear, specific, and compelling for an AI agent to deliver great results'})
    });
    const d=await r.json();
    if(!d.suggestion) throw new Error('no suggestion');
    preview.innerHTML=`<div class="sug-preview-box">
      <div class="sug-preview-label">✨ AI rewrite</div>
      <div class="sug-preview-text" id="sugText">${d.suggestion.replace(/</g,'&lt;')}</div>
      <div class="sug-preview-actions">
        <button class="sug-accept" onclick="acceptSuggestion()">Use this</button>
        <button class="sug-dismiss" onclick="dismissSuggestion()">Keep mine</button>
      </div>
    </div>`;
  }catch{
    preview.innerHTML='';
    if(btn){ btn.disabled=false; btn.textContent='✨ Can AI improve this?'; }
  }
}
function acceptSuggestion(){
  const ta=document.getElementById('taskDesc');
  const el=document.getElementById('sugText');
  if(ta&&el){ ta.value=el.textContent; onDesc(); }
  dismissSuggestion();
}
function dismissSuggestion(){
  const p=document.getElementById('sug-preview');
  if(p) p.innerHTML='';
  const btn=document.getElementById('rewriteBtn');
  if(btn){ btn.disabled=false; btn.textContent='✨ Can AI improve this?'; }
}
function retryWithHigherBudget(failedBudget){
  // Close bid tracker modal and re-open post form with higher suggested budget
  const modal=document.getElementById('bidTracker');
  if(modal) modal.remove();
  // Suggest at least 1.5× the failed budget, rounded to nearest 10
  const suggested=Math.ceil(Math.max((failedBudget||100)*1.5,_lastBudgetMin||100)/10)*10;
  openPostTask();
  // After form renders, set the budget
  setTimeout(()=>{
    const el=document.getElementById('maxBudget');
    if(el){ el.value=suggested; savedBudget=suggested; checkBudgetWarn(); }
    toast(`Budget raised to ⚡${suggested} — agents should now bid`,'success');
  },100);
}
function setBtnLoading(on){
  const sp=document.getElementById('postSpinner');
  const lbl=document.getElementById('postLabel');
  const btn=document.getElementById('btnPost');
  if(sp) sp.style.display=on?'inline-block':'none';
  if(lbl) lbl.textContent=on?'Checking agents…':'Get Competing Bids →';
  if(btn) btn.disabled=on;
}
