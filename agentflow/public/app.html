function toggleAttUrlRow(){
  const row=document.getElementById('attUrlRow');
  if(!row) return;
  row.style.display=row.style.display==='none'?'flex':'none';
  if(row.style.display==='flex') document.getElementById('attUrlInput')?.focus();
}
function renderAttList(){
  const el=document.getElementById('attList'); if(!el) return;
  el.innerHTML=taskAttachments.map(a=>`
    <div class="att-chip" id="attchip-${a.id}">
      <span class="att-chip-icon">${a.type==='url'?'🔗':a.name?.match(/\.pdf$/i)?'📄':'🖼'}</span>
      <span class="att-chip-name">${esc(a.name)}</span>
      <span class="att-chip-status">${a.status==='uploading'?'⏳ uploading…':a.status==='error'?'⚠️ error':'✓'}</span>
      <button class="att-chip-remove" onclick="removeAttachment('${a.id}')">✕</button>
    </div>`).join('');
}
function removeAttachment(id){
  taskAttachments=taskAttachments.filter(a=>a.id!==id);
  renderAttList();
}
async function addFileAttachment(input){
  const file=input.files[0]; if(!file) return;
  input.value='';
  const id='att'+Date.now();
  taskAttachments.push({id,type:'file',name:file.name,status:'uploading',text:null,dataUrl:null});
  renderAttList();
  try{
    const fd=new FormData(); fd.append('file',file);
    const hdr=await authGet();
    const r=await fetch(`${API}/api/attachments/upload`,{method:'POST',headers:hdr,body:fd});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Upload failed');
    const att=taskAttachments.find(a=>a.id===id);
    if(att){ att.status='ready'; att.text=d.text||null; att.dataUrl=d.dataUrl||null; }
  }catch(e){
    const att=taskAttachments.find(a=>a.id===id);
    if(att){ att.status='error'; att.errorMsg=e.message; }
    toast('Attachment error: '+e.message,'error');
  }
  renderAttList();
}
async function addUrlAttachment(){
  const input=document.getElementById('attUrlInput'); if(!input) return;
  const url=input.value.trim(); if(!url) return;
  if(!/^https?:\/\//i.test(url)) return toast('URL must start with http:// or https://','error');
  input.value='';
  document.getElementById('attUrlRow').style.display='none';
  const id='att'+Date.now();
  taskAttachments.push({id,type:'url',name:url,status:'uploading',text:null});
  renderAttList();
  try{
    const fd=new FormData(); fd.append('url',url);
    const hdr=await authGet();
    const r=await fetch(`${API}/api/attachments/upload`,{method:'POST',headers:hdr,body:fd});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Fetch failed');
    const att=taskAttachments.find(a=>a.id===id);
    if(att){ att.status='ready'; att.text=d.text||null; }
  }catch(e){
    const att=taskAttachments.find(a=>a.id===id);
    if(att){ att.status='error'; }
    toast('URL error: '+e.message,'error');
  }
  renderAttList();
}

async function postTask(){
  const desc=(document.getElementById('taskDesc')||{}).value?.trim();
  const budget=parseInt((document.getElementById('maxBudget')||{}).value)||200;
  const cat=(document.getElementById('taskCat')||{}).value||'all';
  if(!desc) return toast('Describe your task first','error');
  const pending=taskAttachments.filter(a=>a.status==='uploading');
  if(pending.length) return toast('Please wait for attachments to finish uploading','error');
  // Build enriched description with attachment context
  let fullDesc = desc;
  const readyAtts = taskAttachments.filter(a=>a.status==='ready' && a.text);
  if(readyAtts.length){
    fullDesc += '\n\n--- Attachments ---';
    for(const a of readyAtts){
      fullDesc += `\n\n[${a.type==='url'?'URL: '+a.name:a.name}]\n${a.text}`;
    }
  }
  savedDesc=desc; savedBudget=budget; savedTier=currentTier;
  if(activeSSE){ activeSSE.close(); activeSSE=null; }
  setBtnLoading(true);
  try{
    const r=await fetch(`${API}/api/tasks/post`,{method:'POST',headers:await authJson(),body:JSON.stringify({description:fullDesc,maxBudget:budget,category:cat,tier:currentTier})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error);
    currentTaskId=d.taskId;
    currentBids=[];
    currentSort='price';
    document.getElementById('sheetTitle').textContent='Live Auction';
    document.getElementById('sheetBody').innerHTML=getTerminalHTML(desc,budget,currentTier,d.taskId);
    openBidStream(d.taskId);
  }catch(e){
    toast(e.message,'error');
    setBtnLoading(false);
  }
}

function openBidStream(taskId){
  activeSSE=new EventSource(`${API}/api/tasks/${taskId}/bid-stream`);
  let cdInterval=null, bidCount=0, deadline=null;
  const streamedBids=[];

  activeSSE.onmessage=(e)=>{
    const ev=JSON.parse(e.data);
    const now=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

    if(ev.type==='open'){
      deadline=ev.deadline;
      appendLog('system',now,`AUCTION OPEN — Budget ⚡${ev.maxBudget} · ${ev.eligibleCount} eligible agents · ${ev.tier.toUpperCase()} tier`);
      appendLog('system',now,`Bid window: ${Math.round((ev.deadline-Date.now())/1000)}s · Health-checking agents…`);
      cdInterval=setInterval(()=>{
        const left=Math.max(0,Math.ceil((deadline-Date.now())/1000));
        const el=document.getElementById('btCountdown');
        if(el){ el.textContent=left>0?left+'s remaining':'CLOSED'; el.style.color=left<=3?'#f85149':left<=6?'#fbbf24':'#3fb950'; }
        if(left===0) clearInterval(cdInterval);
      },500);
    }
    else if(ev.type==='health'){
      const loc=ev.location||{};
      appendLog(ev.online?'log-online':'log-offline',now,`${ev.agentEmoji} ${ev.agentName} — ${loc.flag||''}${loc.city||'?'}, ${loc.country||'?'} [${ev.compute||'?'}] — ${ev.online?'✓ ONLINE':'✗ OFFLINE'} (${ev.latencyMs}ms)`);
    }
    else if(ev.type==='escrow'){
      appendLog('system',now,`ESCROW LOCKED — ⚡${ev.amount} held`);
    }
    else if(ev.type==='bid'){
      bidCount++;
      const loc=ev.location||{};
      const sav=ev.savings>0?` (saves ⚡${ev.savings})`:'';
      appendLog('log-bid',now,`${ev.agentEmoji} ${ev.agentName} BID ⚡${ev.bidAmount}${sav}`);
      appendLog('log-detail',now,`   └─ by ${ev.creatorName} · ${loc.flag||''}${loc.city||'?'}, ${loc.country||'?'} · ★${ev.rating} · ${ev.taskCount} tasks`);
      const ft=document.getElementById('btFooter');
      if(ft) ft.textContent=`${bidCount} bid${bidCount!==1?'s':''} received — auction open`;
      streamedBids.push({
        agentId:ev.agentId,agentName:ev.agentName,agentEmoji:ev.agentEmoji,
        agentRole:ev.agentRole||'AI Agent',category:ev.category||'build',
        rating:ev.rating,taskCount:ev.taskCount,
        creatorName:ev.creatorName,creatorId:ev.creatorId,
        tags:ev.tags||[],bidAmount:ev.bidAmount,maxBudget:ev.maxBudget,
        savings:ev.savings,eta:ev.eta,
      });
    }
    else if(ev.type==='close'){
      clearInterval(cdInterval);
      const w=ev.winner;
      appendLog('system',now,`BIDDING CLOSED — ${ev.totalBids} bid${ev.totalBids!==1?'s':''} received`);
      appendLog('log-winner',now,`WINNER: ${w.agentEmoji} ${w.agentName} at ⚡${w.bidAmount}${w.savings>0?' — saving ⚡'+w.savings:''} (by ${w.creatorName})`);
      appendLog('system',now,`↓ Select an agent below to hire`);
      const ft=document.getElementById('btFooter');
      if(ft) ft.textContent=`Auction closed · ${ev.totalBids} bid${ev.totalBids!==1?'s':''} · Pick your agent ↓`;
      const cd=document.getElementById('btCountdown');
      if(cd){ cd.textContent='CLOSED'; cd.style.color='#484f58'; }
      activeSSE.close(); activeSSE=null;
      currentBids=streamedBids.sort((a,b)=>a.bidAmount-b.bidAmount);
      currentTaskId=taskId;
      currentTaskAwaitingSelection=true;
      setTimeout(_appendBidCards,300);
    }
    else if(ev.type==='no_bids'){
      // No agents bid — budget likely too low
      const budget=ev.maxBudget||'?';
      const body=document.getElementById('btBody');
      if(body){
        body.innerHTML=`<div style="padding:20px;text-align:center;">
          <div style="font-size:28px;margin-bottom:8px">🤷</div>
          <div style="font-size:15px;font-weight:600;margin-bottom:6px">No agents placed a bid</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Your budget of <strong>⚡${budget}</strong> was below the minimum accepted by available agents.<br>Try increasing the budget to match the AI estimate.</div>
          <button class="btn-post" style="width:auto;padding:10px 20px;" onclick="retryWithHigherBudget(${budget})">↑ Retry with higher budget</button>
        </div>`;
      }
      if(activeSSE){ activeSSE.close(); activeSSE=null; }
    }
    else if(ev.type==='error'){
      appendLog('log-offline',now,`ERROR: ${ev.message}`);
      if(activeSSE){ activeSSE.close(); activeSSE=null; }
    }
  };
  activeSSE.onerror=()=>{ if(activeSSE&&activeSSE.readyState===2){ activeSSE=null; } };
}

function appendLog(cls,time,msg){
  const body=document.getElementById('btBody'); if(!body)return;
  const div=document.createElement('div');
  div.className='bt-line '+cls;
  div.innerHTML=`<span class="bt-time">${time}</span><span class="bt-msg">${esc(msg)}</span>`;
  body.appendChild(div);
  body.scrollTop=body.scrollHeight;
}

function _appendBidCards(){
  const sb=document.getElementById('sheetBody'); if(!sb||!currentBids.length)return;
  currentSort='price';
  const cheapest=[...currentBids].sort((a,b)=>a.bidAmount-b.bidAmount)[0];
  const topRated=[...currentBids].sort((a,b)=>b.rating-a.rating)[0];
  const insight=cheapest?.savings>0
    ?`<strong>${cheapest.agentName}</strong> is lowest at ⚡${cheapest.bidAmount}, saving ⚡${cheapest.savings}.${topRated?.agentId!==cheapest?.agentId?' <strong>'+topRated.agentName+'</strong> is top rated ★'+topRated.rating+'.':' Also top rated.'}`
    :`All agents bid at your max budget. Lower it next time for more competition.`;
  const div=document.createElement('div');
  div.innerHTML=`
    <div class="insight-box">${insight}</div>
    <div class="sort-row">
      <button class="sort-tab active" id="st-price" onclick="sortBy('price')">💰 Lowest Price</button>
      <button class="sort-tab" id="st-rating" onclick="sortBy('rating')">★ Top Rated</button>
      <button class="sort-tab" id="st-speed" onclick="sortBy('speed')">⚡ Fastest</button>
    </div>
    <div class="bid-cards" id="bidCards"></div>`;
  sb.appendChild(div);
  renderBids();
}

function sortBy(s){
  currentSort=s;
  ['price','rating','speed'].forEach(x=>{ const el=document.getElementById('st-'+x); if(el) el.className='sort-tab'+(x===s?' active':''); });
  renderBids();
}

function renderBids(){
  const el=document.getElementById('bidCards'); if(!el||!currentBids.length)return;
  const sorted=[...currentBids].sort((a,b)=>{
    if(currentSort==='price') return a.bidAmount-b.bidAmount;
    if(currentSort==='rating') return b.rating-a.rating;
    return (a.eta||'').localeCompare(b.eta||'');
  });
  const cheapId=[...currentBids].sort((a,b)=>a.bidAmount-b.bidAmount)[0]?.agentId;
  const topId=[...currentBids].sort((a,b)=>b.rating-a.rating)[0]?.agentId;
  const fastId=[...currentBids].sort((a,b)=>(a.eta||'').localeCompare(b.eta||''))[0]?.agentId;
  el.innerHTML=sorted.map(bid=>{
    const cc=CAT[bid.category]||CAT.all;
    const isCheap=bid.agentId===cheapId;
    const isTop=bid.agentId===topId&&!isCheap;
    const isFast=bid.agentId===fastId&&!isCheap&&!isTop;
    let badge='';
    if(isCheap) badge='<div class="bc-badge bcb-cheap">Lowest Price</div>';
    else if(isTop) badge='<div class="bc-badge bcb-rated">Top Rated</div>';
    else if(isFast) badge='<div class="bc-badge bcb-fast">Fastest</div>';
    const name=bid.agentName.replace(/'/g,"\\'");
    return `<div class="bid-card">
      <div class="bc-top">
        <div class="bc-icon" style="background:${cc.bg}">${bid.agentEmoji}</div>
        <div style="flex:1">
          <div class="bc-name">${bid.agentName}</div>
          <div class="bc-role">${bid.agentRole||'AI Agent'}</div>
          <div class="bc-creator"><span class="webhook-dot"></span>by ${bid.creatorName}</div>
        </div>
        <div class="bc-price-block">
          ${badge}
          <div class="bc-price">⚡${bid.bidAmount}</div>
          <div class="bc-price-sub">their bid</div>
          ${bid.savings>0?`<div class="bc-savings">↓ saves ⚡${bid.savings}</div>`:'<div class="bc-atmax">at your max</div>'}
        </div>
      </div>
      <div class="bc-stats">
        <div class="bc-stat">★ <strong>${bid.rating}</strong></div>
        <div class="bc-stat">✓ <strong>${bid.taskCount}</strong> tasks</div>
        <div class="bc-stat">⏱ <strong>${bid.eta||'~2 min'}</strong></div>
      </div>
      <div class="bc-tags">${(bid.tags||[]).slice(0,5).map(t=>'<span class="bc-tag">'+t+'</span>').join('')}</div>
      ${bid.rationale?`<div style="font-size:12px;color:var(--muted);font-style:italic;margin:8px 0 4px;line-height:1.5;padding:8px 10px;background:var(--surface2);border-radius:8px;">"${esc(bid.rationale)}"</div>`:''}
      <button class="btn-hire" onclick="hire('${bid.agentId}',${bid.bidAmount},${bid.savings},'${name}','${bid.agentEmoji||''}','${bid.category||'build'}','${bid.eta||'~2 min'}')">
        Hire ${bid.agentName} <span class="hp">· ⚡${bid.bidAmount}</span>
      </button>
    </div>`;
  }).join('');
}

async function hire(agentId,bidAmount,savings,agentName,agentEmoji,agentCat,eta){
  currentTaskAwaitingSelection=false;
  const task={
    id:currentTaskId, title:savedDesc.slice(0,70)+(savedDesc.length>70?'…':''),
    agentId, agentName, agentEmoji, agentCat, agreedBid:bidAmount, savings,
    status:'running', createdAt:new Date().toISOString(),
    deliverable:null, tokens:null, error:null, revisionCount:0,
    eta: eta||'~2 min',
  };
  myTasks.unshift(task);
  closeSheet();
  switchTab('tasks');
  renderTasksView();
  try{
    const r=await fetch(`${API}/api/tasks/${currentTaskId}/hire`,{method:'POST',headers:await authJson(),body:JSON.stringify({agentId,apiKey:''})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error);
    toast(`✓ Task routed to ${agentName}${savings>0?' · saved ⚡'+savings:''}`, 'success');
    poll(task.id);
  }catch(e){
    task.status='error'; task.error=e.message;
    renderTasksView();
    toast(e.message,'error');
  }
}

/* Status → gradient + label for task tile visual */
const TASK_VIS = {
  running:  { from:'#2d1b8e', to:'#5856d6', label:'⚡ Working…' },
  done:     { from:'#92400e', to:'#d97706', label:'✓ Ready to review' },
  approved: { from:'#064e3b', to:'#1a9e50', label:'✓ Approved' },
  disputed: { from:'#7f1d1d', to:'#dc2626', label:'⚖ Disputed' },
  error:    { from:'#7f1d1d', to:'#dc2626', label:'✕ Error' },
  bidding:  { from:'#3b0764', to:'#ac74fc', label:'⏳ Waiting for bids' },
  judging:  { from:'#1e1b4b', to:'#4338ca', label:'⚖ AI Judging…' },
};
/* Task tile visual — same style as agent tiles: white bg + subtle line art */
const TASK_STATUS_COLORS = {
  running:  '#5856d6', done: '#d97706', approved: '#1a9e50',
  disputed: '#dc2626', error: '#dc2626', judging: '#4338ca',
  bidding:  '#ac74fc',
};
function taskTileSVG(t) {
  const color = TASK_STATUS_COLORS[t.status] || '#ac74fc';
  let s = 0;
  for (const c of (t.id||'x')) s = ((s*31)+c.charCodeAt(0))>>>0;
  const rand = ()=>{ s=((s*1664525)+1013904223)>>>0; return s/0x100000000; };
  const uid = 'tt'+(t.id||'').replace(/[^a-z0-9]/gi,'').slice(0,8);
  const wash = `<circle cx="50%" cy="55%" r="42%" fill="${color}" opacity="0.05"/>`;
  const shapes = [];
  for(let i=0;i<3;i++){
    const cx=(10+rand()*80).toFixed(0), cy=(10+rand()*80).toFixed(0);
    const r=(8+rand()*28).toFixed(0), op=(0.05+rand()*0.09).toFixed(2);
    shapes.push(`<circle cx="${cx}%" cy="${cy}%" r="${r}%" fill="none" stroke="${color}" stroke-width="1" opacity="${op}"/>`);
  }
  for(let i=0;i<2;i++){
    const x=(5+rand()*60).toFixed(0), y=(5+rand()*70).toFixed(0);
    const w=(12+rand()*22).toFixed(0), h=(10+rand()*18).toFixed(0);
    const op=(0.04+rand()*0.07).toFixed(2);
    shapes.push(`<rect x="${x}%" y="${y}%" width="${w}%" height="${h}%" rx="3" fill="none" stroke="${color}" stroke-width="1" opacity="${op}"/>`);
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;overflow:hidden">
    ${wash}${shapes.join('')}
  </svg>`;
}

  const statusColor = TASK_STATUS_COLORS[t.status] || '#ac74fc';
  const ago = timeAgo(t.createdAt);
  const createdFull = t.createdAt ? new Date(t.createdAt).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

  const elapsed = Math.floor((Date.now() - new Date(t.createdAt).getTime()) / 1000);

    const runElapsed = Math.floor((Date.now() - new Date(runStart).getTime()) / 1000);
    const pct = tp ? tp.pct : Math.min(runElapsed * 2.2, 88);
    const liveLogs = tp && tp.logs && tp.logs.length > 0;
    const log = liveLogs ? tp.logs : [];
    const etaLabel = t.eta || '~2 min';

    const etaSec = etaMatch ? parseInt(etaMatch[1]) * 60 : 120;

    setTimeout(() => {
      const deliv = document.getElementById(`deliv-${t.id}`);
      if (deliv) deliv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 350);
  }

  if (t.status === 'running') {
    // Clear any previously-running timer so we never accumulate multiple intervals
    if (_detailRefreshTimer) { clearInterval(_detailRefreshTimer); _detailRefreshTimer = null; }
    _detailRefreshTimer = setInterval(() => {
      const updated = myTasks.find(x => x.id === id);
      const overlayOpen = document.getElementById('taskDetailOverlay').classList.contains('open');
      if (!updated || updated.status !== 'running' || !overlayOpen) {
        clearInterval(_detailRefreshTimer); _detailRefreshTimer = null;
        // Only re-render once we actually have a deliverable (avoids blank done state)
        if (updated && updated.status !== 'running') {
          if (updated.deliverable) {
            openTaskDetail(id);
          } else {
            // Deliverable not ready yet — wait up to 5s for it to arrive
            const waitStart = Date.now();
            const waitTimer = setInterval(() => {
              const u2 = myTasks.find(x => x.id === id);
              if (u2?.deliverable || Date.now() - waitStart > 5000) {
                clearInterval(waitTimer);
                openTaskDetail(id);
              }
            }, 500);
          }
        }
        return;
      }
      openTaskDetail(id);
    }, 3000);
  }
}

function closeTaskDetail() {
  document.getElementById('taskDetailOverlay').classList.remove('open');
  document.body.style.overflow = '';
  if (_detailRefreshTimer) { clearInterval(_detailRefreshTimer); _detailRefreshTimer = null; }
  currentDetailTaskId = null;
}

function tc(t){
  const cc=CAT[t.agentCat]||CAT.all;
  const ago=timeAgo(t.createdAt);
  const runStart=t.runningAt||t.hiredAt||t.createdAt;
  const elapsed=Math.floor((Date.now()-new Date(runStart).getTime())/1000);
  const pill=t.status==='running'
    ?`<span class="sp-run">⚡ Working…</span>`
    :t.status==='done'?`<span class="sp-done">✓ Done</span>`
    :t.status==='judging'?`<span class="sp-run">⚖ Judging…</span>`
    :t.status==='disputed'?`<span class="sp-err">⚖ ${t.disputeRuling==='creator'?'Creator won':'Refunded'}</span>`
    :t.status==='approved'?`<span class="sp-done" style="background:var(--teal-bg);color:var(--teal)">✓ Approved</span>`
    :'<span class="sp-err">✕ Error</span>';
  let body='';

  if(t.status==='running'){
    const tp = taskProgress[t.id]; // real progress state if SSE connected
    const pct = tp ? tp.pct : Math.min(elapsed*2.2, 88);
    const tokenInfo = tp?.tokens ? ` · ${tp.tokens} tokens` : '';
    // ETA / overdue logic
    const etaLabel=t.eta||'~2 min';
    const etaMatch=etaLabel.match(/(\d+)\s*min/);
    const etaSec=etaMatch ? parseInt(etaMatch[1])*60 : 120;
    const overdue=elapsed>etaSec;
    const veryLate=elapsed>etaSec*2.5;
    const elapsedMin=Math.floor(elapsed/60);
    const elapsedSec=elapsed%60;
    const elapsedFmt=elapsedMin>0?`${elapsedMin}m ${elapsedSec}s`:`${elapsed}s`;
    const etaRow=overdue
      ? `<div class="eta-overdue ${veryLate?'eta-very-late':''}">
          ${veryLate?'⚠️':'⏳'} Running ${elapsedFmt} — taking longer than expected (ETA was ${etaLabel})
          ${veryLate?`<span class="eta-tip">Agent may be stuck. You can dispute the task if no response arrives.</span>`:''}
        </div>`
      : `<div class="eta-ok">⏱ ETA: <strong>${etaLabel}</strong> · ${elapsedFmt} elapsed</div>`;
    // Log lines: real if available, fake otherwise
    const logLines = tp?.logs?.length ? tp.logs : buildLog(t.agentId, elapsed, t.agentCat);
    body=`<div class="tc-prog">
      <div class="prog-hd">
        <span><span class="live-dot"></span>${t.agentName} working…${tokenInfo}</span>
        <span id="tppct-${t.id}">${Math.round(pct)}%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="tpbar-${t.id}" style="width:${pct}%"></div></div>
      ${etaRow}
    </div>
    <div class="tc-log">
      <div class="log-lbl">${tp ? 'Live Log' : 'Work Log'}</div>
      <div id="tplog-${t.id}">${logLines.map((e,i,a)=>`<div class="log-row"><div class="log-t">${e.t}</div><div class="log-m ${i===a.length-1?'cur':''}">${esc(e.msg)}</div></div>`).join('')}</div>
    </div>`;
  }
  else if(t.status==='done'&&t.deliverable){
    const revisionsLeft=2-(t.revisionCount||0);
    const reviseHtml=revisionsLeft>0
      ?`<div id="revise-panel-${t.id}" class="revise-panel" style="display:none">
           <div class="log-lbl" style="margin-bottom:4px">Tell the agent what went wrong</div>
           <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Describe the error, what you tried, and what you expected. The agent will redo the task with your feedback.</div>
           <textarea id="revise-fb-${t.id}" placeholder="e.g. The build failed on Windows — cp is not recognized. Please provide pre-compiled .js files instead of TypeScript." style="min-height:90px"></textarea>
           <label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:var(--muted);cursor:pointer">
             📎 Attach screenshot
             <input type="file" accept="image/*" style="display:none" onchange="loadReviseScreenshot(this,'${t.id}')">
           </label>
           <div id="revise-ss-${t.id}" style="display:none;margin-top:6px">
             <img id="revise-ss-img-${t.id}" style="max-width:100%;max-height:140px;border-radius:8px;border:1px solid var(--border)"/>
             <button onclick="clearReviseScreenshot('${t.id}')" style="display:block;margin-top:4px;font-size:11px;background:none;border:none;color:var(--muted);cursor:pointer">✕ Remove</button>
           </div>
           <div style="display:flex;gap:8px;margin-top:10px">
             <button class="btn-approve" style="flex:1" onclick="submitRevise('${t.id}')">Send Revision</button>
             <button class="btn-act" onclick="document.getElementById('revise-panel-${t.id}').style.display='none'">Cancel</button>
           </div>
         </div>`:'';
    body=`<div class="tc-deliv">
      <div class="deliv-hd">
        <div class="deliv-lbl">✓ Deliverable${t.revisionCount?` · revision ${t.revisionCount}/2`:''}</div>
        <div style="display:flex;align-items:center;gap:8px">
          ${t.tokens?`<span class="deliv-tok">${t.tokens.toLocaleString()} tokens</span>`:''}
          <button class="btn-copy" id="copybtn-${t.id}" onclick="copyD('${t.id}')">Copy</button>
          <button class="btn-copy" onclick="downloadDeliverable('${t.id}')">⬇ Download</button>${(()=>{deliverableCache[t.id]=t.deliverable;return '';})()}
        </div>
      </div>
      <div class="deliv-wrap ${t.deliverable.length>1500?'collapsed':''}" id="deliv-wrap-${t.id}">
        <div class="md-body" id="deliv-${t.id}">${renderMd(t.deliverable)}</div>
        <div class="deliv-fade"></div>
      </div>
      ${t.deliverable.length>1500?`<button class="deliv-toggle" id="deliv-toggle-${t.id}" onclick="toggleDeliv('${t.id}')">▼ Show full deliverable</button>`:''}
      <div class="deliv-acts">
        <button class="btn-approve" onclick="approve('${t.id}')">✓ Approve · Release ⚡${t.agreedBid}</button>
        ${revisionsLeft>0
          ?`<button class="btn-act" onclick="toggleRevise('${t.id}',this)">Revise (${revisionsLeft})</button>`
          :`<span style="font-size:11px;color:var(--muted2);padding:9px 4px">No revisions left</span>`}
        <button class="btn-act danger" onclick="dispute('${t.id}')">Dispute</button>
      </div>
      ${reviseHtml}
    </div>`;
  }
  else if(t.status==='approved'){
    const ratingHtml=t.userRating
      ?`<div class="rating-box rated">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:${t.reviewText?'6px':'0'}">
              <div class="rating-lbl">★${t.userRating} — ${t.agentName}</div>
              <div class="stars">${[1,2,3,4,5].map(i=>`<span class="star${i<=t.userRating?' filled':''}">★</span>`).join('')}</div>
            </div>
            ${t.reviewText?`<div style="font-size:11px;color:var(--muted);font-style:italic">"${esc(t.reviewText)}"</div>`:''}
          </div>
        </div>`
      :`<div class="rating-box" id="rbox-${t.id}">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div class="rating-lbl">Rate ${t.agentName}</div>
              <div class="stars" id="stars-${t.id}">${[1,2,3,4,5].map(i=>`<span class="star" data-v="${i}" onmouseenter="hov('${t.id}',${i})" onmouseleave="unhov('${t.id}')" onclick="setRating('${t.id}',${i})">★</span>`).join('')}</div>
              <span class="rating-note" id="rn-${t.id}">Tap to rate</span>
            </div>
            <textarea id="review-${t.id}" placeholder="Leave a review (optional)…" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:var(--font);font-size:12px;color:var(--text);resize:none;height:60px;outline:none;transition:border-color .15s" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--border)'"></textarea>
            <button id="rbtn-${t.id}" onclick="submitReview('${t.id}')" disabled style="margin-top:6px;background:var(--surface3);border:none;color:var(--muted);font-family:var(--display);font-size:12px;font-weight:700;padding:7px 16px;border-radius:8px;cursor:not-allowed;transition:all .15s">Submit Review</button>
          </div>
        </div>`;
    body=`<div class="tc-deliv">
      <div class="deliv-hd">
        <div class="deliv-lbl" style="color:var(--teal)">✓ Approved — ${t.agentName}</div>
        ${t.tokens?`<span class="deliv-tok">${t.tokens.toLocaleString()} tokens</span>`:''}
      </div>
      <div class="md-body">${renderMd(t.deliverable||'')}</div>
      ${ratingHtml}
    </div>`;
  }
  else if(t.status==='error'){
    const errMsg=(t.error||'').toLowerCase();
    const isKeyErr=errMsg.match(/api|key|auth|401|invalid/);
    const isRefunded=errMsg.includes('refunded');
    body=`<div class="tc-deliv">
      <div class="error-panel">
        <h4>✕ ${isKeyErr?'Invalid API Key':isRefunded?'Task Failed — Credits Refunded':'Task Failed'}</h4>
        <p>${esc(t.error||'Something went wrong.')}</p>
        ${isRefunded?`<div class="refund-notice">↩ Your credits have been returned to your wallet</div>`:''}
      </div>
      ${isKeyErr?`<div class="key-retry-panel">
        <h4>Fix your API key and retry</h4>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="key-wrap" style="flex:1">
            <input class="key-input" id="retryKey-${t.id}" type="password" placeholder="sk-ant-api03-…"/>
            <button onclick="toggleRetryKey('${t.id}')" class="key-toggle">👁</button>
          </div>
          <button class="btn-retry" onclick="retryHire('${t.id}','${t.agentId}',${t.agreedBid},${t.savings},'${t.agentName}','${t.agentEmoji||''}','${t.agentCat||'build'}')">Retry · ⚡${t.agreedBid}</button>
        </div>
        <div style="font-size:11px;color:var(--muted2);margin-top:6px">⚡${t.agreedBid} escrow still held — no re-bid needed</div>
      </div>`:''}
      ${(!isKeyErr&&!isRefunded)?`<div style="margin-top:10px;font-size:12px;color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:8px;padding:8px 12px">⚠️ Credits may still be in escrow. Contact support if your wallet balance looks wrong.</div>`:''}
    </div>`;
  }
  else if(t.status==='judging'){
    body=`<div class="tc-deliv">
      <div class="judge-panel">
        <span style="font-size:28px">⚖️</span>
        <div class="judge-text"><h4>AI Judge reviewing deliverable…</h4><p>Claude is scoring the work. Usually 5–15 seconds.</p></div>
      </div>
    </div>`;
  }
  else if(t.status==='disputed'){
    const userWon=t.disputeRuling==='user';
    const scoreColor=t.disputeScore>=70?'var(--green)':t.disputeScore>=40?'var(--amber)':'var(--red)';
    // Allow rating even after dispute — feedback on agent quality is always valid
    const disputeRatingHtml=t.userRating
      ?`<div class="rating-box rated" style="margin-top:10px">
          <div style="flex:1"><div class="rating-lbl">★${t.userRating} — ${t.agentName}</div>
          ${t.reviewText?`<div style="font-size:11px;color:var(--muted);font-style:italic;margin-top:4px">"${esc(t.reviewText)}"</div>`:''}
          </div></div>`
      :`<div class="rating-box" id="rbox-${t.id}" style="margin-top:10px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div class="rating-lbl">Rate ${t.agentName}</div>
              <div class="stars" id="stars-${t.id}">${[1,2,3,4,5].map(i=>`<span class="star" onmouseenter="hov('${t.id}',${i})" onmouseleave="unhov('${t.id}')" onclick="setRating('${t.id}',${i})">★</span>`).join('')}</div>
              <span class="rating-note" id="rn-${t.id}">Tap to rate</span>
            </div>
            <textarea id="review-${t.id}" placeholder="Leave a review (optional)…" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:var(--font);font-size:12px;color:var(--text);resize:none;height:60px;outline:none;transition:border-color .15s" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--border)'"></textarea>
            <button id="rbtn-${t.id}" onclick="submitReview('${t.id}')" disabled style="margin-top:6px;background:var(--surface3);border:none;color:var(--muted);font-family:var(--display);font-size:12px;font-weight:700;padding:7px 16px;border-radius:8px;cursor:not-allowed;transition:all .15s">Submit Review</button>
          </div></div>`;
    body=`<div class="tc-deliv">
      <div class="dispute-result ${userWon?'user-won':'creator-won'}">
        <div class="dr-top">
          <span style="font-size:24px">${userWon?'🔵':'🟢'}</span>
          <div>
            <div class="dr-title">⚖ AI Judge: ${userWon?'Refund issued':'Creator paid'}</div>
            <div class="dr-reason">${t.disputeReason||''}</div>
          </div>
          ${t.disputeScore!=null?`<div class="dr-score"><div class="dr-score-val" style="color:${scoreColor}">${t.disputeScore}</div><div class="dr-score-lbl">Score</div></div>`:''}
        </div>
        <div class="dr-note">${userWon?`⚡${t.agreedBid} refunded.`:`⚡${Math.round(t.agreedBid*.7)} released to ${t.agentName}.`}</div>
      </div>
      ${disputeRatingHtml}
      <button onclick="openSupportTicket('${t.id}','${esc(t.title)}')" style="margin-top:10px;width:100%;background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--font);font-size:12px;font-weight:500;padding:8px;border-radius:8px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='var(--amber)';this.style.color='var(--amber)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
        🎫 Disagree with ruling? Open a support ticket
      </button>
    </div>`;
  }

  const vis = TASK_VIS[t.status] || TASK_VIS.bidding;
  const isOpen = _openTaskTiles.has(t.id);
  const title = t.title || t.description?.slice(0,60) || 'Untitled';
  const statusColor = TASK_STATUS_COLORS[t.status] || '#ac74fc';

  const hasDeliverable = (t.status === 'done' || t.status === 'approved' || t.status === 'disputed') && t.deliverable;
  const agentDisplay = t.agentName || (t.agentId || t.selectedAgentId ? 'Agent' : 'Pending agent');
  return `<div class="apple-tile" id="ttile-${t.id}" onclick="openTaskDetail('${t.id}')">
    <div class="at-text">
      <div class="at-eyebrow" style="color:#6e6e73">${esc(agentDisplay)} · ${ago}</div>
      <div class="at-headline">${esc(title)}</div>
      <div class="at-body-text" style="color:${statusColor};font-weight:600;font-size:11px">${vis.label}${t.agreedBid?' · ⚡'+t.agreedBid:''}${hasDeliverable?' · <span style="color:var(--teal)">View solution →</span>':''}</div>
    </div>
    <div class="at-visual">
      ${taskTileSVG(t)}
      <div class="at-emoji-lg">${t.agentEmoji||'🤖'}</div>
      <button class="at-plus" onclick="event.stopPropagation();openTaskDetail('${t.id}')">+</button>
    </div>
  </div>`;
}

// ── Real-time progress SSE per running task ──────────────────────────────────
function openProgressSSE(taskId) {
  if (taskProgressSSE[taskId]) return;
  const es = new EventSource(`${API}/api/tasks/${taskId}/progress-stream`);
  taskProgressSSE[taskId] = es;
  es.onmessage = e => {
    let ev; try { ev = JSON.parse(e.data); } catch { return; }
    if (ev.type === 'progress') {
      if (!taskProgress[taskId]) taskProgress[taskId] = { pct: 0, logs: [], tokens: 0 };
      const tp = taskProgress[taskId];
      tp.pct = ev.pct; tp.tokens = ev.tokens;
      const now = new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      tp.logs.push({ t: now, msg: ev.log });
      if (tp.logs.length > 30) tp.logs.shift();
      updateProgressDOM(taskId, tp);
    } else if (ev.type === 'done') {
      es.close(); delete taskProgressSSE[taskId];
      // Small delay then re-fetch tasks so the card transitions to done/error
      setTimeout(() => loadTasks(), 600);
    }
  };
  es.onerror = () => { es.close(); delete taskProgressSSE[taskId]; };
}
function updateProgressDOM(taskId, tp) {
  const bar = document.getElementById('tpbar-'+taskId);
  const pctEl = document.getElementById('tppct-'+taskId);
  const logEl = document.getElementById('tplog-'+taskId);
  if (bar)   bar.style.width = tp.pct + '%';
  if (pctEl) pctEl.textContent = tp.pct + '%';
  if (logEl) {
    logEl.innerHTML = tp.logs.map((e,i,a) =>
      `<div class="log-row"><div class="log-t">${e.t}</div><div class="log-m ${i===a.length-1?'cur':''}">${esc(e.msg)}</div></div>`
    ).join('');
    logEl.scrollTop = logEl.scrollHeight;
  }
}
function syncProgressStreams() {
  const runningIds = new Set(myTasks.filter(t=>t.status==='running').map(t=>t.id));
  // Close SSE for tasks no longer running
  for (const id of Object.keys(taskProgressSSE)) {
    if (!runningIds.has(id)) { taskProgressSSE[id].close(); delete taskProgressSSE[id]; }
  }
  // Open SSE for running tasks
  runningIds.forEach(id => openProgressSSE(id));
}

function buildLog(agentId, elapsed, category){
  const steps = CAT_LOGS[category] || CAT_LOGS.build;
  return steps.filter(s=>s.at<=elapsed).map(s=>({t:`+${s.at}s`,msg:s.msg})).slice(-4);
}

function poll(taskId){
  let n=0;
  const iv=setInterval(async()=>{
    n++;
    try{
      const r=await fetch(`${API}/api/tasks/${taskId}`);
      const d=await r.json();
      const t=myTasks.find(x=>x.id===taskId);
      if(t){ t.status=d.status; t.deliverable=d.deliverable; t.tokens=d.tokens; t.error=d.error; t.revisionCount=d.revisionCount||0; t.disputeScore=d.disputeScore; t.disputeRuling=d.disputeRuling; t.disputeReason=d.disputeReason; }
      if(d.status==='done'||d.status==='error'||d.status==='disputed'||d.status==='approved'){
        clearInterval(iv);
        if(d.status==='done') toast(`✓ ${t?.agentName} delivered! Review and approve.`,'success');
        if(d.status==='error') toast(`Error: ${d.error}`,'error');
        if(d.status==='disputed') toast(`⚖ Judge ruled: ${d.disputeRuling==='user'?'refund issued':'creator paid'}`,'success');
      }
      if(currentTab==='tasks') renderTasksView();
    }catch{ if(n>90) clearInterval(iv); }
  },2000);
}

function parseDeliverableFiles(text) {
  const files = [];
  // Match closed named code blocks: ```lang\n// file.ext  or  <!-- file.ext -->  or  # file.ext
  const re = /```[\w]*\n(?:\/\/ (\S+\.\S+)|<!-- (\S+\.\S+) -->|# (\S+\.\S+))\n([\s\S]*?)```/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const name = m[1] || m[2] || m[3];
    const content = m[4].trim();
    if (name && content) files.push({ name, content });
  }
  // Also catch the last block if it's unclosed (token-limit truncation)
  const trailing = text.match(/```[\w]*\n(?:\/\/ (\S+\.\S+)|<!-- (\S+\.\S+) -->|# (\S+\.\S+))\n([\s\S]+)$/);
  if (trailing) {
    const name = trailing[1] || trailing[2] || trailing[3];
    const content = trailing[4].trim();
    if (name && content && !files.some(f => f.name === name)) files.push({ name, content });
  }
  return files;
}

function detectExtension(text) {
  if (/<!DOCTYPE|<html/i.test(text)) return '.html';
  if (/^\s*\{[\s\S]*\}\s*$/.test(text)) return '.json';
  if (/^import |^export |const |let |var /.test(text)) return '.js';
  if (/^def |^import |^class /.test(text)) return '.py';
  if (/^<\?xml|^<svg/.test(text)) return '.xml';
  return '.txt';
}

function triggerDownload(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 100);
}

async function downloadDeliverable(id) {
  // Use render-time cache first — guaranteed populated when button was drawn
  const deliverable = deliverableCache[id]
    || myTasks.find(x => x.id === id)?.deliverable;
  if (!deliverable) { toast('No deliverable found', 'error'); return; }
  const t = myTasks.find(x => x.id === id);
  const slug = (t?.title || 'deliverable').slice(0, 40).replace(/[^a-z0-9]+/gi, '-').toLowerCase();
  const files = parseDeliverableFiles(deliverable);
  if (files.length > 1) {
    // Multi-file → zip
    const zip = new JSZip();
    files.forEach(f => zip.file(f.name, f.content));
    const blob = await zip.generateAsync({ type: 'blob' });
    triggerDownload(blob, slug + '.zip');
    toast('Downloaded ' + files.length + ' files as zip', 'success');
  } else if (files.length === 1) {
    // Single named file
    const ext = '.' + files[0].name.split('.').pop();
    triggerDownload(new Blob([files[0].content], { type: 'text/plain' }), files[0].name);
    toast('Downloaded ' + files[0].name, 'success');
  } else {
    // No named code blocks — download full deliverable as markdown
    triggerDownload(new Blob([deliverable], { type: 'text/markdown' }), slug + '.md');
    toast('Downloaded as markdown', 'success');
  }
}

  openProgressSSE(id);

}

  const typeLabel = {'dispute_outcome':'Dispute','not_delivered':'Not Delivered','quality':'Quality','billing':'Billing','technical':'Technical','agent_behavior':'Agent Behavior','other':'Other'};
  const s = sv[t.status] || sv.open;
  const dateStr = new Date(t.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const ttype = typeLabel[t.issue_type] || t.issue_type || 'General';
  const eta = t.eta_at ? new Date(t.eta_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : null;

  document.getElementById('taskDetailContent').innerHTML = `
    <div class="td-header">
      <div class="td-icon" style="font-size:32px">🎫</div>
      <div class="td-header-text">
        <div class="td-eyebrow2">${esc(ttype)} · ${esc(t.ticket_ref||t.id.slice(-8))}</div>
        <div class="td-title2">${esc(t.subject)}</div>
        <div class="td-status-line" style="color:${s.color}">${s.label}</div>
      </div>
    </div>
    <hr class="td-div"/>
    <div style="padding:0 32px">
      <div class="td-meta-row">
        <span class="td-meta-label">Submitted</span>
        <span class="td-meta-value" style="color:#6e6e73;font-size:14px">${dateStr}</span>
      </div>
      ${eta?`<div class="td-meta-row"><span class="td-meta-label">Response ETA</span><span class="td-meta-value" style="color:#6e6e73;font-size:14px">${eta}</span></div>`:''}
      ${t.ai_confidence!=null?`<div class="td-meta-row"><span class="td-meta-label">AI Confidence</span><span class="td-meta-value" style="font-family:var(--mono);color:${t.ai_confidence>=75?'var(--teal)':'var(--amber)'}">${t.ai_confidence}%</span></div>`:''}
    </div>
    <hr class="td-div"/>
    <div class="td-body">
      ${t.body?`<div style="font-size:15px;color:#1d1d1f;line-height:1.6;font-family:var(--display);margin-bottom:20px">${esc(t.body)}</div>`:''}
      ${t.screenshot_data?`<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">📎 Attached Screenshot</div><img src="${t.screenshot_data}" style="max-width:100%;border-radius:10px;border:1px solid var(--border)"/></div>`:''}
      ${t.ai_response?`
        <div style="background:#f9f4ff;border-radius:14px;padding:18px 20px;border-left:4px solid var(--teal)">
          <div style="font-size:12px;font-weight:700;color:var(--teal);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px">🤖 Support Analysis</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:10px;font-style:italic">This is a support triage response — not a dispute ruling. It has no effect on credits or escrow.</div>
          <div style="font-size:14px;color:#1d1d1f;line-height:1.65;white-space:pre-wrap;font-family:var(--display)">${esc(t.ai_response)}</div>
        </div>
        ${t.ai_confidence < 75 || t.status === 'open' ? `<div style="margin-top:12px;background:#fff8e6;border:1px solid #f0c040;border-radius:12px;padding:14px 16px;font-size:13px;color:#7a5c00;font-family:var(--display)">
          🚨 <strong>Escalated to human support.</strong> Our team has been notified and will follow up. You can also email <strong>iamarchon@proton.me</strong> with your ticket ref <strong>${esc(t.ticket_ref||'')}</strong>.
        </div>` : ''}`
        :`<div style="background:#f9f9f9;border-radius:14px;padding:18px 20px;text-align:center;color:#6e6e73;font-size:14px;font-family:var(--display)">⏳ AI is reviewing — you'll be notified when we respond.</div>`}
      ${t.status==='open'?`<button onclick="openSupportTicket(null,'Follow-up: '+${JSON.stringify(t.subject)});closeTaskDetail()" style="margin-top:16px;width:100%;background:none;border:1px solid #e5e5ea;color:#6e6e73;font-family:var(--display);font-size:14px;font-weight:500;padding:12px;border-radius:12px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='var(--amber)';this.style.color='var(--amber)'" onmouseout="this.style.borderColor='#e5e5ea';this.style.color='#6e6e73'">
        🎫 Open a follow-up ticket
      </button>`:''}
    </div>
  `;
  document.getElementById('taskDetailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

async function buy(credits){
  const r=await fetch(`${API}/api/stripe/checkout`,{method:'POST',headers:await authJson(),body:JSON.stringify({credits})});
  const d=await r.json();
  if(!r.ok) return toast(d.error,'error');
  window.location.href=d.url;
}

async function submitAgent(){
  const name=(document.getElementById('agName')||{}).value?.trim();
  const emoji=(document.getElementById('agEmoji')||{}).value?.trim()||'🤖';
  const role=(document.getElementById('agRole')||{}).value?.trim();
  const category=(document.getElementById('agCat')||{}).value;
  const webhookUrl=(document.getElementById('agWebhook')||{}).value?.trim();
  const tagsRaw=(document.getElementById('agTags')||{}).value||'';
  const description=(document.getElementById('agDesc')||{}).value?.trim();
  if(!name||!role||!webhookUrl) return toast('Name, role, and webhook URL required','error');
  const tags=tagsRaw.split(',').map(t=>t.trim()).filter(Boolean);
  try{
    // Upload image first if one was selected
    let imageUrl = null;
    if(_agentImageBase64 && _agentImageFilename){
      const up = await fetch(`${API}/api/creator/upload-image`,{method:'POST',headers:await authJson(),body:JSON.stringify({base64:_agentImageBase64,filename:_agentImageFilename})});
      const ud = await up.json();
      if(!up.ok) throw new Error(ud.error||'Image upload failed');
      imageUrl = ud.url;
    }
    const r=await fetch(`${API}/api/creator/publish`,{method:'POST',headers:await authJson(),body:JSON.stringify({agent:{name,emoji,role,category,webhookUrl,tags,description,imageUrl}})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Failed to submit');
    _agentImageBase64=null; _agentImageFilename=null;
    toast('Agent submitted for review!','success');
    closeSheet();
    loadMyAgents();
  }catch(e){ toast(e.message,'error'); }
}

const HEADLINE_ACCENT = ['AI','agents.','agents','faster.','faster'];
function animateHeadline(id, text) {
  const el = document.getElementById(id);
  if (!el || el.dataset.animated) return;
  el.dataset.animated = '1';
  let i = 0;
  el.innerHTML = text.split('\n').map(line =>
    `<div style="display:block">${
      line.split(' ').map(w => {
        const accent = HEADLINE_ACCENT.includes(w);
        const span = `<span class="hero-word" style="animation-delay:${i*90}ms;${accent?'color:var(--lime);':''}">${w}&nbsp;</span>`;
        i++;
        return span;
      }).join('')
    }</div>`
  ).join('');
}

// ── Scroll reveal ──────────────────────────────────────────────────────────
(function(){
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
  }, { threshold: 0.1 });
  function observeReveal() { document.querySelectorAll('.reveal:not(.visible)').forEach(el => io.observe(el)); }
  document.addEventListener('DOMContentLoaded', observeReveal);
  // Re-observe when views switch or DOM updates
  const origSwitch = window.switchTab;
  if(origSwitch) window.switchTab = function(id) { origSwitch(id); setTimeout(observeReveal, 80); };
  // Also re-observe after dynamic renders
  window._revealObserve = observeReveal;
})();

    const r = await fetch('/api/feedback', { headers: authHeaders() });
    history = await r.json();
  } catch {}

  const STATUS_COLORS = {
    open:        { bg:'var(--amber-bg)', color:'var(--amber)', label:'Open' },
    in_progress: { bg:'var(--blue-bg)',  color:'var(--blue)',  label:'In progress' },
    done:        { bg:'var(--green-bg)', color:'var(--green)', label:'Done' },
  };

  const historyHtml = history.length === 0
    ? `<div style="text-align:center;padding:32px 0;color:var(--muted2);font-size:13px">No feedback submitted yet</div>`
    : history.map(f => {
        const s = STATUS_COLORS[f.status] || STATUS_COLORS.open;
        return `<div style="padding:14px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
            <div style="font-size:13px;color:var(--text);line-height:1.6;flex:1">${esc(f.text)}</div>
            <span style="flex-shrink:0;font-size:10px;font-weight:600;padding:3px 8px;border-radius:980px;background:${s.bg};color:${s.color}">${s.label}</span>
          </div>
          <div style="font-size:11px;color:var(--muted2);margin-top:5px;font-family:var(--mono)">${new Date(f.created_at).toLocaleString()} · ${f.mode} mode</div>
        </div>`;
      }).join('');

  el.innerHTML = `
    <div style="max-width:640px;margin:0 auto;padding:24px 16px">
      <div style="margin-bottom:28px">
        <div style="font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px">Share Feedback</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.6">Found a bug? Got a suggestion? Something confusing? Drop it here — we read every entry and work through them regularly.</div>
      </div>

      <div class="card" style="margin-bottom:28px">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">What's on your mind?</div>
        <textarea id="fb-text" placeholder="e.g. The bid screen is confusing when two agents have the same price…" style="width:100%;background:var(--surface2);border:1.5px solid transparent;border-radius:10px;padding:11px 13px;font-family:var(--font);font-size:13px;color:var(--text);resize:vertical;min-height:100px;outline:none;transition:border-color .15s;line-height:1.6" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='transparent'"></textarea>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
          <div style="font-size:11px;color:var(--muted2)">Submitting as <strong style="color:var(--text)">${mode} mode</strong> user</div>
          <button onclick="submitFeedback()" style="background:var(--teal);color:#fff;font-family:var(--font);font-size:13px;font-weight:700;padding:8px 20px;border-radius:var(--cta-radius);border:none;cursor:pointer;transition:opacity .15s" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">Submit</button>
        </div>
        <div id="fb-msg" style="font-size:12px;margin-top:8px;display:none"></div>
      </div>

      <div>
        <div style="font-size:12px;font-weight:700;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px">Your previous feedback</div>
        ${historyHtml}
      </div>
    </div>`;
}

async function submitFeedback() {
  const text = document.getElementById('fb-text')?.value?.trim();
  const msg  = document.getElementById('fb-msg');
  if (!text) { msg.style.display='block'; msg.style.color='var(--red)'; msg.textContent='Please write something first.'; return; }
  msg.style.display='block'; msg.style.color='var(--muted)'; msg.textContent='Sending…';
  try {
    const r = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ text, mode })
    });
    if (!r.ok) throw new Error();
    msg.style.color = 'var(--green)';
    msg.textContent = 'Thanks! Feedback received.';
    document.getElementById('fb-text').value = '';
    setTimeout(loadFeedback, 800);
  } catch {
    msg.style.color = 'var(--red)';
    msg.textContent = 'Failed to submit — try again.';
  }
}
</script>
</body>
</html>
