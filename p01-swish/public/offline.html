<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swish — Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f7;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      text-align: center;
      padding: 40px 28px;
      max-width: 400px;
    }
    .logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #1d1d1f;
      margin-bottom: 24px;
    }
    .logo .dot { color: #0071e3; }
    .icon { font-size: 48px; margin-bottom: 20px; }
    .title {
      font-size: 20px;
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }
    .body {
      font-size: 15px;
      color: #6e6e73;
      line-height: 1.6;
    }
    .retry {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
    }
    .retry:hover { opacity: .88; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">swish<span class="dot">.</span></div>
    <div class="icon">📡</div>
    <div class="title">You're offline</div>
    <p class="body">Check your connection and try again.</p>
    <button class="retry" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
